<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>71키로의 여정</title>
  <link rel="manifest" href="/diet/manifest.json" />
  <meta name="theme-color" content="#E85D3A" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --bg: #FAFAFA;
      --bg-deep: #F0F0F0;
      --card: #FFFFFF;
      --text: #333333;
      --text-inv: #FFFFFF;
      --sub: #888888;
      --sub2: #AAAAAA;
      --border: rgba(0,0,0,0.08);
      --primary: #E85D3A;
      --primary-bg: rgba(232,93,58,0.1);
      --primary-bg2: rgba(232,93,58,0.15);
      --success: #4CAF50;
      --success-bg: rgba(76,175,80,0.12);
      --energy: #FF8C42;
      --energy-bg: rgba(255,140,66,0.12);
      --diet-green: #66BB6A;
      --diet-green-bg: rgba(102,187,106,0.12);
      --settings-gray: #78909C;
      --danger: #f44336;
      --danger-bg: rgba(244,67,54,0.1);
      --blue: #2196F3;
      --blue-bg: rgba(33,150,243,0.1);
      --gold: #FFD700;
      --gold-bg: rgba(255,215,0,0.12);
      --nav-bg: rgba(255,255,255,0.92);
      --nav-border: rgba(0,0,0,0.06);
      --shadow: 0 2px 12px rgba(0,0,0,0.06);
      --shadow-lg: 0 4px 20px rgba(0,0,0,0.1);
      --input-bg: #F5F5F5;
      --input-border: rgba(0,0,0,0.1);
      --overlay: rgba(0,0,0,0.5);
      --check-unchecked: #CCCCCC;
    }
    [data-theme="dark"] {
      --bg: #1A1A2E;
      --bg-deep: #0f0f1a;
      --card: #16213E;
      --text: #EEEEEE;
      --text-inv: #FFFFFF;
      --sub: #AAAAAA;
      --sub2: #666666;
      --border: rgba(255,255,255,0.06);
      --primary: #E85D3A;
      --primary-bg: rgba(232,93,58,0.15);
      --primary-bg2: rgba(232,93,58,0.2);
      --success: #4CAF50;
      --success-bg: rgba(76,175,80,0.15);
      --energy: #FF8C42;
      --energy-bg: rgba(255,140,66,0.15);
      --diet-green: #66BB6A;
      --diet-green-bg: rgba(102,187,106,0.15);
      --settings-gray: #78909C;
      --danger: #f44336;
      --danger-bg: rgba(244,67,54,0.15);
      --blue: #2196F3;
      --blue-bg: rgba(33,150,243,0.15);
      --gold: #FFD700;
      --gold-bg: rgba(255,215,0,0.15);
      --nav-bg: rgba(15,15,35,0.92);
      --nav-border: rgba(255,255,255,0.06);
      --shadow: none;
      --shadow-lg: none;
      --input-bg: #1a1a2e;
      --input-border: rgba(255,255,255,0.1);
      --overlay: rgba(0,0,0,0.7);
      --check-unchecked: #444444;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-deep);
      color: var(--text);
      display: flex;
      justify-content: center;
      min-height: 100dvh;
    }
    #root {
      width: 100%;
      max-width: 430px;
      min-height: 100dvh;
      background: var(--bg);
      position: relative;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
    }
    .header-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }
    .header-date {
      font-size: 13px;
      color: var(--sub);
    }

    /* Content */
    .content {
      flex: 1;
      padding: 20px;
      padding-bottom: 80px;
      overflow-y: auto;
    }

    /* Home */
    .day-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--primary-bg);
      color: var(--primary);
      font-size: 18px;
      font-weight: 700;
      padding: 10px 20px;
      border-radius: 12px;
      margin-bottom: 24px;
    }
    .day-badge .dot {
      width: 10px; height: 10px;
      background: var(--primary);
      border-radius: 50%;
    }

    .timeline {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .timeline-card {
      background: var(--card);
      border-radius: 12px;
      padding: 20px;
      border-left: 3px solid var(--primary);
      box-shadow: var(--shadow);
      transition: transform 0.2s;
    }
    .timeline-card:active {
      transform: scale(0.98);
    }
    .timeline-label {
      font-size: 13px;
      color: var(--primary);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .timeline-empty {
      font-size: 14px;
      color: var(--sub2);
    }
    .timeline-card.day-b {
      border-left-color: var(--energy);
    }
    .timeline-card.day-b .timeline-label {
      color: var(--energy);
    }
    .timeline-time {
      font-size: 15px;
      font-weight: 600;
      color: var(--sub);
      margin-bottom: 14px;
    }

    /* Checklist */
    .checklist {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .check-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      padding: 8px 10px;
      border-radius: 8px;
      transition: background 0.2s;
    }
    .check-item.checked {
      background: var(--success-bg);
    }
    .check-item.checked .check-text {
      text-decoration: line-through;
      color: var(--sub2);
    }
    .check-box {
      width: 20px;
      height: 20px;
      min-width: 20px;
      border-radius: 5px;
      border: 2px solid var(--check-unchecked);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 1px;
      transition: all 0.2s;
    }
    .check-item.checked .check-box {
      border-color: var(--success);
      background: var(--success);
    }
    .check-box svg {
      width: 12px;
      height: 12px;
      fill: var(--text-inv);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .check-item.checked .check-box svg {
      opacity: 1;
    }
    .check-text {
      font-size: 14px;
      color: var(--text);
      line-height: 1.5;
      transition: all 0.2s;
    }
    .check-sub {
      font-size: 12px;
      color: var(--sub2);
      margin-top: 2px;
      line-height: 1.4;
    }

    /* Progress */
    .card-progress {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .progress-bar {
      flex: 1;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s ease;
    }
    .progress-fill.green { background: var(--primary); }
    .progress-fill.blue { background: var(--energy); }
    .progress-text {
      font-size: 12px;
      color: var(--sub);
      white-space: nowrap;
    }

    /* Accordion */
    .accordion {
      margin-top: 6px;
      margin-left: 40px;
      border-radius: 10px;
      overflow: hidden;
    }
    .accordion-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: var(--blue-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.2s;
    }
    .accordion-header:hover {
      background: var(--blue-bg);
    }
    .accordion-header.open {
      border-radius: 10px 10px 0 0;
    }
    .accordion-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--blue);
    }
    .accordion-meta {
      font-size: 11px;
      color: var(--sub2);
    }
    .accordion-arrow {
      font-size: 12px;
      color: var(--blue);
      transition: transform 0.25s ease;
    }
    .accordion-arrow.open {
      transform: rotate(180deg);
    }
    .accordion-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
      background: var(--card);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 10px 10px;
    }
    .accordion-body.open {
      max-height: 800px;
    }
    .accordion-content {
      padding: 12px 14px;
    }
    .workout-step {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .workout-step:last-child {
      border-bottom: none;
    }
    .step-num {
      width: 22px;
      height: 22px;
      min-width: 22px;
      border-radius: 50%;
      background: var(--blue-bg);
      color: var(--blue);
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .step-info {
      flex: 1;
    }
    .step-name {
      font-size: 13px;
      color: var(--text);
      font-weight: 500;
    }
    .step-detail {
      font-size: 11px;
      color: var(--sub2);
      margin-top: 2px;
    }
    .step-target {
      font-size: 11px;
      color: var(--blue);
      margin-top: 1px;
    }
    .workout-rest {
      text-align: center;
      padding: 8px;
      font-size: 12px;
      color: var(--energy);
      background: var(--energy-bg);
      border-radius: 6px;
      margin: 8px 0;
    }
    .workout-flow {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      padding: 10px 14px;
      background: var(--blue-bg);
      border-radius: 8px;
      margin-top: 8px;
    }
    .flow-step {
      font-size: 11px;
      color: var(--blue);
      background: var(--blue-bg);
      padding: 4px 8px;
      border-radius: 4px;
    }
    .flow-arrow {
      font-size: 10px;
      color: var(--sub2);
    }

    /* Day counter */
    .day-counter {
      font-size: 12px;
      color: var(--sub);
      margin-top: 6px;
    }

    /* Settings */
    .settings-section {
      margin-bottom: 28px;
    }
    .settings-label {
      font-size: 13px;
      color: var(--sub);
      margin-bottom: 10px;
      font-weight: 500;
    }
    .settings-input {
      width: 100%;
      padding: 12px 14px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 10px;
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    .settings-input:focus {
      border-color: var(--primary);
    }
    .settings-hint {
      font-size: 11px;
      color: var(--sub2);
      margin-top: 6px;
    }
    .settings-saved {
      display: inline-block;
      font-size: 12px;
      color: var(--primary);
      margin-top: 8px;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .settings-card {
      background: var(--card);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
    }
    .settings-card-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 16px;
    }
    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .settings-row:last-child { margin-bottom: 0; }
    .settings-row-label {
      font-size: 14px;
      color: var(--text);
    }
    .settings-row-input {
      width: 120px;
      padding: 8px 10px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      text-align: right;
      outline: none;
    }
    .settings-row-input:focus { border-color: var(--primary); }
    .settings-row-value {
      font-size: 14px;
      color: var(--primary);
      font-weight: 600;
    }
    /* Toggle */
    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .toggle {
      width: 44px;
      height: 24px;
      border-radius: 12px;
      background: var(--check-unchecked);
      position: relative;
      cursor: pointer;
      transition: background 0.2s;
      border: none;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .toggle.on { background: var(--primary); }
    .toggle-knob {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #fff;
      position: absolute;
      top: 2px;
      left: 2px;
      transition: left 0.2s;
    }
    .toggle.on .toggle-knob { left: 22px; }
    /* Alarm row */
    .alarm-row {
      display: flex;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .alarm-row:last-child { border-bottom: none; }
    .alarm-info { flex: 1; }
    .alarm-name { font-size: 14px; color: var(--text); }
    .alarm-time-input {
      width: 80px;
      padding: 6px 8px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
      text-align: center;
      outline: none;
      margin-right: 10px;
    }
    .alarm-time-input:focus { border-color: var(--primary); }
    .settings-reset-btn {
      width: 100%;
      padding: 14px;
      border: 1px solid var(--danger);
      border-radius: 10px;
      background: transparent;
      color: var(--danger);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      -webkit-tap-highlight-color: transparent;
    }
    .settings-reset-btn:active { background: var(--danger-bg); }

    /* Running tracker */
    .running-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: calc(100dvh - 160px);
      justify-content: center;
      transition: background 0.4s;
      margin: -20px;
      padding: 20px;
      border-radius: 0;
    }
    .running-wrap.active {
      background: linear-gradient(180deg, rgba(232,93,58,0.08) 0%, transparent 60%);
    }
    .run-distance {
      font-size: 64px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -2px;
      line-height: 1;
    }
    .run-unit {
      font-size: 22px;
      font-weight: 400;
      color: var(--sub);
      margin-left: 4px;
    }
    .run-stats {
      display: flex;
      gap: 28px;
      margin-top: 28px;
      margin-bottom: 40px;
    }
    .run-stat {
      text-align: center;
    }
    .run-stat-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
    }
    .run-stat-label {
      font-size: 11px;
      color: var(--sub2);
      margin-top: 4px;
    }
    .run-controls {
      display: flex;
      gap: 20px;
      align-items: center;
    }
    .run-btn {
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.15s, box-shadow 0.15s;
      font-weight: 700;
      color: var(--text-inv);
    }
    .run-btn:active {
      transform: scale(0.93);
    }
    .run-btn-start {
      width: 88px;
      height: 88px;
      background: var(--primary);
      font-size: 16px;
      box-shadow: 0 4px 24px rgba(232,93,58,0.35);
    }
    .run-btn-pause {
      width: 64px;
      height: 64px;
      background: var(--energy);
      font-size: 13px;
      box-shadow: 0 4px 20px rgba(255,140,66,0.3);
    }
    .run-btn-resume {
      width: 64px;
      height: 64px;
      background: var(--primary);
      font-size: 13px;
      box-shadow: 0 4px 20px rgba(232,93,58,0.3);
    }
    .run-btn-stop {
      width: 64px;
      height: 64px;
      background: var(--danger);
      font-size: 13px;
      box-shadow: 0 4px 20px rgba(244,67,54,0.3);
    }
    .run-gps-status {
      font-size: 12px;
      color: var(--sub2);
      margin-top: 20px;
    }
    .run-gps-status.connected {
      color: var(--success);
    }
    .run-summary {
      background: var(--card);
      border-radius: 12px;
      padding: 24px;
      width: 100%;
      margin-top: 20px;
      border-left: 3px solid var(--primary);
      box-shadow: var(--shadow);
    }
    .run-summary-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 16px;
    }
    .run-summary-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .run-summary-row:last-child {
      border-bottom: none;
    }
    .run-summary-label {
      font-size: 14px;
      color: var(--sub);
    }
    .run-summary-value {
      font-size: 14px;
      color: var(--text);
      font-weight: 600;
    }
    .run-history {
      margin-top: 24px;
      width: 100%;
    }
    .run-history-title {
      font-size: 14px;
      color: var(--sub);
      margin-bottom: 12px;
      font-weight: 600;
    }
    .run-history-item {
      background: var(--card);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: var(--shadow);
    }
    .run-history-date {
      font-size: 13px;
      color: var(--sub);
    }
    .run-history-dist {
      font-size: 15px;
      color: var(--primary);
      font-weight: 700;
    }
    .run-history-detail {
      font-size: 11px;
      color: var(--sub2);
      margin-top: 2px;
    }
    .run-history-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .run-delete-btn {
      border: none;
      background: none;
      color: var(--sub2);
      font-size: 18px;
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.2s;
    }
    .run-delete-btn:hover {
      color: var(--danger);
    }
    .run-new-btn {
      border: none;
      background: var(--primary-bg);
      color: var(--primary);
      font-size: 14px;
      font-weight: 600;
      padding: 12px 24px;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 16px;
      -webkit-tap-highlight-color: transparent;
    }

    /* Workout timer */
    .wo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: calc(100dvh - 160px);
      margin: -20px;
      padding: 24px 20px;
      transition: background 0.5s;
    }
    .wo-wrap.wo-exercise {
      background: linear-gradient(180deg, rgba(244,67,54,0.1) 0%, transparent 50%);
    }
    .wo-wrap.wo-rest {
      background: linear-gradient(180deg, rgba(33,150,243,0.1) 0%, transparent 50%);
    }
    .wo-phase-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--sub);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .wo-round {
      font-size: 14px;
      color: var(--primary);
      font-weight: 600;
      margin-bottom: 20px;
    }

    /* Circular timer */
    .wo-timer-ring {
      position: relative;
      width: 200px;
      height: 200px;
      margin-bottom: 20px;
    }
    .wo-timer-ring svg {
      transform: rotate(-90deg);
      width: 200px;
      height: 200px;
    }
    .wo-timer-ring circle {
      fill: none;
      stroke-width: 6;
      stroke-linecap: round;
    }
    .wo-timer-bg {
      stroke: var(--border);
    }
    .wo-timer-fg {
      transition: stroke-dashoffset 0.3s linear;
    }
    .wo-timer-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }
    .wo-timer-seconds {
      font-size: 56px;
      font-weight: 800;
      color: var(--text);
      line-height: 1;
    }
    .wo-timer-status {
      font-size: 14px;
      font-weight: 600;
      margin-top: 4px;
    }
    .wo-timer-status.exercise { color: var(--danger); }
    .wo-timer-status.rest { color: var(--blue); }

    /* Exercise info */
    .wo-exercise-name {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }
    .wo-exercise-target {
      font-size: 13px;
      color: var(--sub);
      margin-bottom: 4px;
    }
    .wo-exercise-desc {
      font-size: 12px;
      color: var(--sub2);
      margin-bottom: 16px;
      text-align: center;
      line-height: 1.5;
      max-width: 300px;
    }
    .wo-next-preview {
      font-size: 12px;
      color: var(--sub2);
      margin-top: 12px;
    }

    /* Workout controls */
    .wo-controls {
      display: flex;
      gap: 16px;
      margin-top: 20px;
    }
    .wo-btn {
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: var(--text-inv);
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.15s;
    }
    .wo-btn:active { transform: scale(0.93); }
    .wo-btn-start {
      width: 88px;
      height: 88px;
      background: var(--primary);
      font-size: 15px;
      box-shadow: 0 4px 24px rgba(232,93,58,0.35);
    }
    .wo-btn-pause {
      width: 60px;
      height: 60px;
      background: var(--energy);
      font-size: 12px;
    }
    .wo-btn-resume {
      width: 60px;
      height: 60px;
      background: var(--primary);
      font-size: 12px;
    }

    /* Dumbbell / Plank set UI */
    .wo-set-card {
      background: var(--card);
      border-radius: 12px;
      padding: 20px;
      width: 100%;
      margin-bottom: 12px;
      border-left: 3px solid var(--blue);
      box-shadow: var(--shadow);
    }
    .wo-set-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }
    .wo-set-subtitle {
      font-size: 12px;
      color: var(--sub);
      margin-bottom: 14px;
    }
    .wo-set-progress {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }
    .wo-set-dot {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2px solid var(--check-unchecked);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      color: var(--sub2);
    }
    .wo-set-dot.done {
      border-color: var(--success);
      background: var(--success);
      color: var(--text-inv);
    }
    .wo-set-dot.current {
      border-color: var(--blue);
      color: var(--blue);
    }
    .wo-set-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: var(--blue);
      color: var(--text-inv);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .wo-set-btn:disabled {
      background: var(--check-unchecked);
      color: var(--sub2);
    }
    .wo-set-rest {
      text-align: center;
      padding: 12px;
      font-size: 20px;
      font-weight: 700;
      color: var(--blue);
    }

    /* Stickman */
    .wo-stickman {
      width: 120px;
      height: 120px;
      margin-bottom: 16px;
    }
    .wo-stickman svg {
      width: 120px;
      height: 120px;
    }
    .wo-stickman line, .wo-stickman circle {
      stroke: #FF8C42;
      stroke-width: 3;
      stroke-linecap: round;
      fill: none;
    }
    .wo-stickman circle.head {
      fill: #FF8C42;
    }

    /* Stickman animations */
    @keyframes squat-legs {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(12px); }
    }
    @keyframes pushup-body {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(8px); }
    }
    @keyframes climber-legs {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(10px); }
    }
    @keyframes crunch-torso {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(-25deg); }
    }
    @keyframes burpee-full {
      0% { transform: translateY(0) scale(1); }
      25% { transform: translateY(10px) scale(0.9); }
      50% { transform: translateY(15px) scaleY(0.7); }
      75% { transform: translateY(5px) scale(0.95); }
      100% { transform: translateY(0) scale(1); }
    }
    .stick-squat { animation: squat-legs 1.2s ease-in-out infinite; }
    .stick-pushup { animation: pushup-body 1.5s ease-in-out infinite; }
    .stick-climber { animation: climber-legs 0.6s ease-in-out infinite; }
    .stick-crunch { animation: crunch-torso 1.4s ease-in-out infinite; transform-origin: bottom center; }
    .stick-burpee { animation: burpee-full 2s ease-in-out infinite; }
    .stick-paused { animation-play-state: paused !important; }

    /* Workout done */
    .wo-done-card {
      background: var(--card);
      border-radius: 12px;
      padding: 28px 24px;
      width: 100%;
      text-align: center;
      border-left: 3px solid var(--primary);
      box-shadow: var(--shadow);
    }
    .wo-done-emoji {
      font-size: 48px;
      margin-bottom: 12px;
    }
    .wo-done-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 16px;
    }
    .wo-done-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .wo-done-row:last-child { border-bottom: none; }
    .wo-done-label { font-size: 14px; color: var(--sub); }
    .wo-done-value { font-size: 14px; color: var(--text); font-weight: 600; }

    /* A-day workout */
    .wo-aday {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100dvh - 200px);
      text-align: center;
    }
    .wo-aday-emoji { font-size: 64px; margin-bottom: 16px; }
    .wo-aday-text { font-size: 18px; color: var(--text); margin-bottom: 24px; }
    .wo-aday-btn {
      padding: 14px 32px;
      border: none;
      border-radius: 12px;
      background: var(--primary);
      color: var(--text-inv);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    /* Diet page */
    .diet-summary {
      background: var(--card);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: var(--shadow);
    }
    .diet-summary-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .diet-summary-row:last-child { margin-bottom: 0; }
    .diet-summary-label {
      font-size: 14px;
      color: var(--text);
      flex: 1;
    }
    .diet-summary-nums {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
    }
    .diet-prog-bar {
      width: 100%;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
      margin-top: 4px;
    }
    .diet-prog-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.3s, background 0.3s;
    }

    /* Meal section */
    .meal-section {
      background: var(--card);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: var(--shadow);
    }
    .meal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .meal-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }
    .meal-subtotal {
      font-size: 12px;
      color: var(--sub);
    }
    .meal-add-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 2px dashed var(--check-unchecked);
      background: none;
      color: var(--primary);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      transition: border-color 0.2s;
    }
    .meal-add-btn:hover { border-color: var(--primary); }

    /* Food item */
    .food-item {
      display: flex;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .food-item:last-child { border-bottom: none; }
    .food-info { flex: 1; }
    .food-name {
      font-size: 14px;
      color: var(--text);
    }
    .food-meta {
      font-size: 11px;
      color: var(--sub);
      margin-top: 2px;
    }
    .food-qty {
      font-size: 13px;
      color: var(--primary);
      font-weight: 600;
      margin-right: 12px;
    }
    .food-del-btn {
      border: none;
      background: none;
      color: var(--sub2);
      font-size: 18px;
      cursor: pointer;
      padding: 4px 8px;
      -webkit-tap-highlight-color: transparent;
    }
    .food-del-btn:hover { color: var(--danger); }
    .meal-empty {
      font-size: 13px;
      color: var(--sub2);
      text-align: center;
      padding: 12px 0;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--overlay);
      z-index: 200;
      display: flex;
      justify-content: center;
      align-items: flex-end;
    }
    .modal-content {
      width: 100%;
      max-width: 430px;
      max-height: 85dvh;
      background: var(--bg);
      border-radius: 20px 20px 0 0;
      padding: 20px;
      overflow-y: auto;
      animation: modalUp 0.25s ease;
    }
    @keyframes modalUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .modal-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
    }
    .modal-close {
      border: none;
      background: none;
      color: var(--sub);
      font-size: 24px;
      cursor: pointer;
    }
    .modal-search {
      width: 100%;
      padding: 12px 14px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 10px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      margin-bottom: 16px;
    }
    .modal-search:focus { border-color: var(--primary); }

    /* Food grid */
    .food-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }
    .food-preset {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: border-color 0.2s;
    }
    .food-preset:active { border-color: var(--primary); }
    .food-preset-name {
      font-size: 13px;
      color: var(--text);
      font-weight: 600;
      margin-bottom: 4px;
    }
    .food-preset-info {
      font-size: 11px;
      color: var(--sub);
    }

    /* Custom food form */
    .custom-form {
      background: var(--card);
      border-radius: 10px;
      padding: 14px;
    }
    .custom-form-title {
      font-size: 13px;
      color: var(--sub);
      margin-bottom: 10px;
      font-weight: 600;
    }
    .custom-form-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }
    .custom-input {
      flex: 1;
      padding: 10px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 8px;
      color: var(--text);
      font-size: 13px;
      outline: none;
    }
    .custom-input:focus { border-color: var(--primary); }
    .custom-submit {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: var(--primary);
      color: var(--text-inv);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }
    .custom-submit:disabled { background: var(--check-unchecked); color: var(--sub2); }

    /* Qty selector */
    .qty-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin: 16px 0;
    }
    .qty-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--check-unchecked);
      background: none;
      color: var(--text);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .qty-num {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      min-width: 30px;
      text-align: center;
    }
    .qty-confirm {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: var(--primary);
      color: var(--text-inv);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    /* Weight tracker */
    .wt-section {
      margin-bottom: 20px;
    }
    .wt-input-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .wt-input-label {
      font-size: 13px;
      color: var(--sub);
      white-space: nowrap;
    }
    .wt-input {
      width: 90px;
      padding: 10px 12px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 10px;
      color: var(--text);
      font-size: 18px;
      font-weight: 700;
      text-align: center;
      outline: none;
    }
    .wt-input:focus { border-color: var(--primary); }
    .wt-unit { font-size: 14px; color: var(--sub); }
    .wt-saved {
      font-size: 12px;
      color: var(--primary);
      animation: fadeIn 0.3s ease;
    }
    .wt-chart-wrap {
      background: var(--card);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: var(--shadow);
    }
    .wt-chart-svg {
      width: 100%;
      height: 160px;
      display: block;
    }
    .wt-tooltip {
      position: absolute;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 12px;
      color: var(--text);
      pointer-events: none;
      white-space: nowrap;
      z-index: 50;
      box-shadow: var(--shadow);
    }
    .wt-summary {
      font-size: 13px;
      color: var(--sub);
      text-align: center;
      margin-bottom: 6px;
    }
    .wt-summary-highlight {
      color: var(--primary);
      font-weight: 600;
    }
    .wt-summary-loss { color: var(--success); }
    .wt-summary-gain { color: var(--danger); }

    /* History section */
    .hist-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      border-top: 1px solid var(--border);
      margin-top: 20px;
    }
    .hist-toggle-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--sub);
    }
    .hist-toggle-arrow {
      font-size: 12px;
      color: var(--sub2);
      transition: transform 0.25s;
    }
    .hist-toggle-arrow.open { transform: rotate(180deg); }
    .hist-list {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s ease;
    }
    .hist-list.open { max-height: 2000px; }
    .hist-card {
      background: var(--card);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 8px;
      box-shadow: var(--shadow);
    }
    .hist-card-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .hist-date { font-size: 13px; color: var(--sub); font-weight: 600; }
    .hist-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 600;
    }
    .hist-badge-run { background: var(--primary-bg); color: var(--primary); }
    .hist-badge-workout { background: var(--blue-bg); color: var(--blue); }
    .hist-card-stats {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
    .hist-stat {
      font-size: 12px;
      color: var(--sub);
    }
    .hist-stat b { color: var(--text); font-weight: 600; }
    .hist-empty {
      text-align: center;
      font-size: 13px;
      color: var(--sub2);
      padding: 16px 0;
    }

    /* D-day & Weekly report */
    .dday-badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 12px;
      background: var(--gold-bg);
      color: var(--gold);
      font-size: 14px;
      font-weight: 700;
      border-radius: 8px;
    }
    .weekly-card {
      background: var(--card);
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
    }
    .weekly-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--sub);
      margin-bottom: 14px;
    }
    .weekly-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .weekly-item {
      text-align: center;
    }
    .weekly-value {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
    }
    .weekly-label {
      font-size: 11px;
      color: var(--sub2);
      margin-top: 4px;
    }

    /* Page title */
    .page-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
    }
    .page-subtitle {
      font-size: 14px;
      color: var(--sub2);
      margin-top: 8px;
    }

    /* Bottom Nav */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      background: var(--nav-bg);
      border-top: 1px solid var(--nav-border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex;
      justify-content: space-around;
      padding: 8px 0;
      padding-bottom: max(8px, env(safe-area-inset-bottom));
      z-index: 100;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 6px 12px;
      cursor: pointer;
      border: none;
      background: none;
      color: var(--sub2);
      font-size: 11px;
      font-weight: 500;
      transition: color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-item.active {
      color: var(--primary);
    }
    .nav-icon {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .nav-icon svg {
      width: 22px;
      height: 22px;
      fill: currentColor;
    }
    /* Track background for running */
    .track-bg {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      overflow: hidden;
      pointer-events: none;
      opacity: 0.08;
    }
    .track-lane {
      position: absolute;
      width: 200%;
      height: 100%;
      border: 3px solid var(--primary);
      border-radius: 50%;
      left: -50%;
    }

    /* Pulse animation for start button */
    @keyframes pulse-ring {
      0% { box-shadow: 0 0 0 0 rgba(232,93,58,0.4); }
      70% { box-shadow: 0 0 0 20px rgba(232,93,58,0); }
      100% { box-shadow: 0 0 0 0 rgba(232,93,58,0); }
    }
    .pulse { animation: pulse-ring 2s infinite; }

    /* Round track lanes */
    .round-lanes {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
    }
    .round-lane {
      flex: 1;
      height: 6px;
      border-radius: 3px;
      background: var(--border);
      transition: background 0.3s;
    }
    .round-lane.done { background: var(--success); }
    .round-lane.active { background: var(--energy); animation: blink 1s infinite; }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Track progress for diet */
    .track-progress {
      position: relative;
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: visible;
      margin: 8px 0;
    }
    .track-runner {
      position: absolute;
      top: -8px;
      font-size: 16px;
      transition: left 0.5s ease;
    }
    .track-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.5s ease;
    }

    /* Streak flame */
    @keyframes flame-sway {
      0%, 100% { transform: rotate(-3deg); }
      50% { transform: rotate(3deg); }
    }
    .streak-flame {
      display: inline-block;
      animation: flame-sway 0.6s ease-in-out infinite;
    }

    /* Achievement ring */
    .achieve-ring {
      position: relative;
      width: 80px;
      height: 80px;
    }
    .achieve-ring svg {
      transform: rotate(-90deg);
    }
    .achieve-ring-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }
    .achieve-pct {
      font-size: 20px;
      font-weight: 800;
      color: var(--text);
    }
    .achieve-label {
      font-size: 9px;
      color: var(--sub);
    }
  </style>
</head>
<body>
  <script>
    (function(){var t=localStorage.getItem('diet-theme')||'light';document.documentElement.dataset.theme=t;})();
  </script>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect, useCallback } = React;

    /* ─── Settings helpers ─── */
    const DEFAULT_START = '2026-03-30';
    function getStartDate() {

    /* ─── SVG Weight Chart ─── */
    function WeightChart({ data, goalWeight, startWeight }) {
      const [tooltip, setTooltip] = useState(null);
      const svgRef = React.useRef(null);

      const points = data.filter(d => d.value !== null);
      if (points.length === 0) {
        return <div style={{textAlign:'center',padding:'20px 0',fontSize:13,color:'var(--sub2)'}}>체중을 입력하면 그래프가 표시됩니다</div>;
      }

      const W = 360, H = 140, PX = 36, PY = 16;
      const allVals = [...points.map(p => p.value), goalWeight, startWeight];
      const minV = Math.floor(Math.min(...allVals) - 0.5);
      const maxV = Math.ceil(Math.max(...allVals) + 0.5);
      const rangeV = maxV - minV || 1;

      const toX = (i) => PX + ((W - PX * 2) * i / (data.length - 1 || 1));
      const toY = (v) => PY + (H - PY * 2) * (1 - (v - minV) / rangeV);

      // Actual data polyline
      const dataPoints = [];
      data.forEach((d, i) => { if (d.value !== null) dataPoints.push({ x: toX(i), y: toY(d.value), ...d }); });
      const line = dataPoints.map((p, i) => `${i === 0 ? 'M' : 'L'}${p.x},${p.y}`).join(' ');

      // Goal line
      const goalY = toY(goalWeight);

      // Ideal line (start to goal over full range)
      const idealStart = toY(startWeight);
      const idealEnd = toY(goalWeight);

      // Y-axis labels
      const yLabels = [];
      const step = rangeV <= 4 ? 1 : 2;
      for (let v = minV; v <= maxV; v += step) yLabels.push(v);

      // X-axis labels (every ~7 days)
      const xLabels = [];
      const xStep = Math.max(1, Math.floor(data.length / 5));
      for (let i = 0; i < data.length; i += xStep) xLabels.push({ i, label: data[i].label });
      if (xLabels[xLabels.length - 1]?.i !== data.length - 1) xLabels.push({ i: data.length - 1, label: data[data.length - 1].label });

      const handleClick = (e) => {
        if (!svgRef.current) return;
        const rect = svgRef.current.getBoundingClientRect();
        const cx = (e.clientX - rect.left) / rect.width * W;
        // Find nearest data point
        let best = null, bestDist = Infinity;
        dataPoints.forEach(p => {
          const d = Math.abs(p.x - cx);
          if (d < bestDist) { bestDist = d; best = p; }
        });
        if (best && bestDist < 30) {
          setTooltip({ x: e.clientX - rect.left, y: e.clientY - rect.top - 40, label: best.label, value: best.value });
          setTimeout(() => setTooltip(null), 2000);
        }
      };

      return (
        <div style={{position:'relative'}}>
          <svg ref={svgRef} viewBox={`0 0 ${W} ${H}`} className="wt-chart-svg" onClick={handleClick}>
            {/* Y-axis labels */}
            {yLabels.map(v => (
              <React.Fragment key={v}>
                <line x1={PX} y1={toY(v)} x2={W - PX} y2={toY(v)} stroke="var(--border)" strokeWidth="1" />
                <text x={PX - 4} y={toY(v) + 4} textAnchor="end" fill="var(--sub2)" fontSize="9">{v}</text>
              </React.Fragment>
            ))}
            {/* X-axis labels */}
            {xLabels.map(xl => (
              <text key={xl.i} x={toX(xl.i)} y={H - 2} textAnchor="middle" fill="var(--sub2)" fontSize="8">{xl.label}</text>
            ))}
            {/* Ideal line */}
            <line x1={PX} y1={idealStart} x2={W - PX} y2={idealEnd} stroke="var(--primary-bg)" strokeWidth="1" strokeDasharray="4,4" />
            {/* Goal line */}
            <line x1={PX} y1={goalY} x2={W - PX} y2={goalY} stroke="#FFD700" strokeWidth="1" strokeDasharray="4,3" />
            <text x={W - PX + 2} y={goalY + 3} fill="#FFD700" fontSize="8">{goalWeight}</text>
            {/* Data line */}
            <path d={line} fill="none" stroke="var(--primary)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
            {/* Data dots */}
            {dataPoints.map((p, i) => (
              <circle key={i} cx={p.x} cy={p.y} r="3" fill="var(--primary)" stroke="var(--card)" strokeWidth="1.5" />
            ))}
          </svg>
          {tooltip && (
            <div className="wt-tooltip" style={{left: tooltip.x - 30, top: tooltip.y}}>
              {tooltip.label} — <strong>{tooltip.value}kg</strong>
            </div>
          )}
        </div>
      );
    }

    /* ─── Weekly Report helper ─── */
    function getWeeklyReport() {
      const now = new Date();
      const dayOfWeek = now.getDay(); // 0=Sun
      const mondayOffset = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
      const monday = new Date(now.getFullYear(), now.getMonth(), now.getDate() - mondayOffset);

      let totalKcalDays = 0, totalKcal = 0, workoutCount = 0, totalRunKm = 0;
      const weightValues = [];

      for (let i = 0; i < 7; i++) {
        const d = new Date(monday.getFullYear(), monday.getMonth(), monday.getDate() + i);
        if (d > now) break;
        const ds = `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;

        // Diet calories
        try {
          const diet = JSON.parse(localStorage.getItem(`diet-v2-${ds}`));
          if (diet && diet.checked) {
            let dayKcal = 0;
            Object.keys(diet.checked).forEach(k => {
              if (!diet.checked[k]) return;
              // We can't easily recalc from keys alone, so skip detailed calc
            });
          }
        } catch {}

        // Workout
        try {
          const wo = JSON.parse(localStorage.getItem(`diet-workout-${ds}`));
          if (wo && wo.completed) workoutCount++;
        } catch {}

        // Weight
        const wv = parseFloat(localStorage.getItem(`diet-weight-${ds}`));
        if (!isNaN(wv)) weightValues.push(wv);
      }

      // Running (from run history array)
      try {
        const runs = JSON.parse(localStorage.getItem('diet-run-history')) || [];
        runs.forEach(r => {
          const rd = new Date(r.date);
          if (rd >= monday && rd <= now) totalRunKm += (r.distKm || 0);
        });
      } catch {}

      const wtStart = weightValues.length > 0 ? weightValues[0] : null;
      const wtEnd = weightValues.length > 0 ? weightValues[weightValues.length - 1] : null;
      const wtChange = wtStart !== null && wtEnd !== null ? (wtEnd - wtStart).toFixed(1) : null;

      return { workoutCount, totalRunKm: Math.round(totalRunKm * 100) / 100, wtStart, wtEnd, wtChange };
    }

    /* ─── Diet-Home sync helpers ─── */
    function getDietMealChecked() {
      const diet = loadDiet();
      const ck = diet.checked || {};
      const meatType = diet.meatType || 'mok';
      const dinnerKey = meatType === 'dak' ? 'dinner_dak' : 'dinner_mok';
      // Check if ALL default items in a section are checked
      const allChecked = (section, defaults) => defaults.every(f => ck[section + '-' + f.id]);
      const lunchDone = allChecked('lunch', DEFAULT_MEALS.lunch);
      const dinnerDone = allChecked('dinner', DEFAULT_MEALS[dinnerKey]);
      const snackDone = !!ck['snack-ds-1'];
      // Calc totals from checked items only
      let totalKcal = 0, totalProt = 0;
      const addSection = (section, defaults) => {
        defaults.forEach(f => {
          if (ck[section + '-' + f.id]) { totalKcal += f.kcal; totalProt += f.protein; }
        });
        // extras
        ((diet.extras || {})[section] || []).forEach(f => {
          if (ck[section + '-' + f.id]) { totalKcal += f.kcal * (f.qty || 1); totalProt += f.protein * (f.qty || 1); }
        });
      };
      addSection('lunch', DEFAULT_MEALS.lunch);
      addSection('dinner', DEFAULT_MEALS[dinnerKey]);
      addSection('snack', DEFAULT_MEALS.snack);
      // Collect checked extras for display on home
      const getExtras = (section) => ((diet.extras || {})[section] || []).filter(f => ck[section + '-' + f.id]);
      const extras = {
        lunch: getExtras('lunch'),
        dinner: getExtras('dinner'),
        snack: getExtras('snack'),
      };
      return { lunchDone, dinnerDone, snackDone, totalKcal: Math.round(totalKcal), totalProt: Math.round(totalProt * 10) / 10, extras };
    }

    function HomePage() {
      const [checks, setChecks] = useState(loadChecks);
      const [dietSync, setDietSync] = useState(getDietMealChecked);
      const { dayType, isA, dayNumber } = getDayInfo();
      const routine = ROUTINES[dayType];
      const cardClass = isA ? '' : ' day-b';

      // Re-sync diet data periodically (when tab becomes visible)
      useEffect(() => {
        const sync = () => setDietSync(getDietMealChecked());
        window.addEventListener('focus', sync);
        const iv = setInterval(sync, 2000);
        return () => { window.removeEventListener('focus', sync); clearInterval(iv); };
      }, []);

      const toggle = useCallback((id) => {
        setChecks((prev) => {
          const next = { ...prev, [id]: !prev[id] };
          saveChecks(next);
          return next;
        });
      }, []);

      // Determine if a home item is checked (diet-synced or manual)
      const isItemChecked = (mealSlot, itemId) => {
        // Lunch items: synced from diet
        if (mealSlot === 'lunch') return dietSync.lunchDone;
        // Dinner: d-4 (산책) is manual, d-1~d-3 synced from diet
        if (mealSlot === 'dinner' && itemId === 'd-4') return !!checks[itemId];
        if (mealSlot === 'dinner') return dietSync.dinnerDone;
        // Morning items: manual checks
        return !!checks[itemId];
      };

      // Weight tracking
      const [todayWt, setTodayWt] = useState(() => getTodayWeight());
      const [wtSaved, setWtSaved] = useState(false);
      const [wtHistory, setWtHistory] = useState(() => getWeightHistory(30));
      const settings = loadSettings();
      const startWt = settings.weight || 71;
      const goalWt = settings.goalWeight || 67;

      // D-day
      const goalDate = new Date((settings.goalDate || '2026-06-01') + 'T00:00:00');
      const today = new Date();
      const todayMid = new Date(today.getFullYear(), today.getMonth(), today.getDate());
      const dDayNum = Math.ceil((goalDate - todayMid) / (1000*60*60*24));
      const dDayText = dDayNum > 0 ? `D-${dDayNum}` : dDayNum === 0 ? 'D-Day! \uD83C\uDF89' : `D+${Math.abs(dDayNum)}`;

      // Weekly report
      const weekly = useMemo(() => getWeeklyReport(), []);

      const handleWtChange = useCallback((e) => {
        const v = parseFloat(e.target.value);
        setTodayWt(e.target.value);
        if (v > 0) {
          saveTodayWeight(v);
          setWtHistory(getWeightHistory(30));
          setWtSaved(true);
          setTimeout(() => setWtSaved(false), 1500);
        }
      }, []);

      // Weight summary
      const wtPoints = wtHistory.filter(d => d.value !== null);
      const currentWt = wtPoints.length > 0 ? wtPoints[wtPoints.length - 1].value : null;
      const wtDiff = currentWt !== null ? (currentWt - startWt).toFixed(1) : null;
      // Weekly avg change
      const recentWeek = wtPoints.slice(-7);
      const weeklyChange = recentWeek.length >= 2
        ? ((recentWeek[recentWeek.length-1].value - recentWeek[0].value) / (recentWeek.length - 1) * 7).toFixed(2)
        : null;

      const checkIcon = (
        <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
      );

      // Achievement: % of morning items + diet items checked today
      const morningItems = routine[0].items;
      const morningChecked = morningItems.filter(it => !!checks[it.id]).length;
      const dietChecked = (dietSync.lunchDone ? routine[1].items.length : 0) + (dietSync.dinnerDone ? routine[2].items.length : 0);
      const totalItems = routine.reduce((s, m) => s + m.items.length, 0);
      const totalChecked = morningChecked + dietChecked + (routine[2].items.filter(it => it.id === 'd-4' && !!checks[it.id]).length);
      const achievePct = totalItems > 0 ? Math.round((totalChecked / totalItems) * 100) : 0;

      // Streak: consecutive days with at least 1 check
      const streakCount = useMemo(() => {
        let streak = 0;
        const now = new Date();
        for (let i = 0; i < 60; i++) {
          const d = new Date(now.getFullYear(), now.getMonth(), now.getDate() - i);
          const key = `diet-${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`;
          try {
            const data = JSON.parse(localStorage.getItem(key));
            if (data && Object.values(data).some(v => v === true)) { streak++; }
            else if (i > 0) break;
          } catch { if (i > 0) break; }
        }
        return streak;
      }, []);

      // Achievement ring SVG
      const ringR = 32;
      const ringCirc = 2 * Math.PI * ringR;
      const ringOffset = ringCirc * (1 - achievePct / 100);

      return (
        <div>
          <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:12,flexWrap:'wrap'}}>
            <div className="achieve-ring">
              <svg width="80" height="80" viewBox="0 0 80 80">
                <circle cx="40" cy="40" r={ringR} fill="none" stroke="var(--border)" strokeWidth="6" />
                <circle cx="40" cy="40" r={ringR} fill="none" stroke="var(--primary)" strokeWidth="6"
                  strokeLinecap="round" strokeDasharray={ringCirc} strokeDashoffset={ringOffset}
                  style={{transition:'stroke-dashoffset 0.5s ease'}} />
              </svg>
              <div className="achieve-ring-center">
                <div className="achieve-pct">{achievePct}</div>
                <div className="achieve-label">%</div>
              </div>
            </div>
            <div style={{flex:1}}>
              <div className="day-badge" style={isA ? {marginBottom:0} : { background: 'var(--energy-bg)', color: 'var(--energy)', marginBottom:0 }}>
                <span className="dot" style={isA ? {} : { background: 'var(--energy)' }} />
                {isA ? '\uC870\uAE45\uC77C (A)' : '\uB9E8\uBAAC \uC778\uD130\uBC8C\uC77C (B)'}
              </div>
              <div style={{display:'flex',alignItems:'center',gap:8,marginTop:6}}>
                <div className="dday-badge">{dDayText}</div>
                {streakCount > 0 && (
                  <div style={{fontSize:14,fontWeight:700,color:'var(--energy)'}}>
                    <span className="streak-flame">{'\uD83D\uDD25'}</span> {streakCount}day streak
                  </div>
                )}
              </div>
            </div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:8}}>
            <div className="day-counter" style={{marginBottom:0}}>Day {dayNumber}</div>
            {dietSync.totalKcal > 0 && (
              <div style={{fontSize:13,color:'var(--primary)',fontWeight:600}}>
                {'\uD83D\uDD25'} {dietSync.totalKcal.toLocaleString()}kcal | {'\uD83E\uDD69'} {dietSync.totalProt}g
              </div>
            )}
          </div>

          {/* Weight tracker */}
          <div className="wt-section">
            <div className="wt-input-row">
              <span className="wt-input-label">{'\u2696\uFE0F'} {'\uC624\uB298 \uCCB4\uC911'}</span>
              <input className="wt-input" type="number" inputMode="decimal" step="0.1"
                value={todayWt || ''} onChange={handleWtChange} placeholder="--" />
              <span className="wt-unit">kg</span>
              {wtSaved && <span className="wt-saved">{'\u2713'}</span>}
            </div>
            <div className="wt-chart-wrap">
              <WeightChart data={wtHistory} goalWeight={goalWt} startWeight={startWt} />
            </div>
            {currentWt !== null && (
              <div className="wt-summary">
                {'\uC2DC\uC791'} {startWt}kg {'\u2192'} {'\uD604\uC7AC'} <span className="wt-summary-highlight">{currentWt}kg</span>
                {' ('}
                <span className={parseFloat(wtDiff) <= 0 ? 'wt-summary-loss' : 'wt-summary-gain'}>
                  {parseFloat(wtDiff) > 0 ? '+' : ''}{wtDiff}kg
                </span>
                {')'}
                {weeklyChange !== null && (
                  <span style={{marginLeft:8,color:'var(--sub)'}}>
                    | {'\uC8FC\uAC04'} {parseFloat(weeklyChange) > 0 ? '+' : ''}{weeklyChange}kg
                  </span>
                )}
              </div>
            )}
          </div>

          {/* Weekly Report */}
          <div className="weekly-card">
            <div className="weekly-title">{'\uD83D\uDCCA'} {'\uC774\uBC88 \uC8FC \uC694\uC57D'}</div>
            <div className="weekly-grid">
              <div className="weekly-item">
                <div className="weekly-value">{weekly.workoutCount}{'\uD68C'}</div>
                <div className="weekly-label">{'\uC6B4\uB3D9 \uD69F\uC218'}</div>
              </div>
              <div className="weekly-item">
                <div className="weekly-value">{weekly.totalRunKm}km</div>
                <div className="weekly-label">{'\uCD1D \uB7EC\uB2DD'}</div>
              </div>
              <div className="weekly-item">
                {weekly.wtChange !== null ? (
                  <>
                    <div className="weekly-value" style={{color: parseFloat(weekly.wtChange) <= 0 ? 'var(--success)' : 'var(--danger)'}}>
                      {parseFloat(weekly.wtChange) > 0 ? '+' : ''}{weekly.wtChange}kg
                    </div>
                    <div className="weekly-label">{weekly.wtStart}{'\u2192'}{weekly.wtEnd}kg</div>
                  </>
                ) : (
                  <>
                    <div className="weekly-value" style={{color:'var(--sub2)'}}>-</div>
                    <div className="weekly-label">{'\uCCB4\uC911 \uAE30\uB85D \uC5C6\uC74C'}</div>
                  </>
                )}
              </div>
              <div className="weekly-item">
                <div className="weekly-value">{dDayText}</div>
                <div className="weekly-label">{'\uBAA9\uD45C\uAE4C\uC9C0'}</div>
              </div>
            </div>
          </div>

          {!isA && (
            <div className="workout-flow" style={{marginBottom: 16, marginTop: 12}}>
              {FLOW_STEPS.map((s, i) => (
                <React.Fragment key={i}>
                  {i > 0 && <span className="flow-arrow">{'\u2192'}</span>}
                  <span className="flow-step">{s}</span>
                </React.Fragment>
              ))}
            </div>
          )}

          <div className="timeline" style={{marginTop: isA ? 16 : 0}}>
            {routine.map((meal) => {
              const done = meal.items.filter((it) => {
                if (meal.slot === 'lunch') return dietSync.lunchDone;
                if (meal.slot === 'dinner' && it.id === 'd-4') return !!checks[it.id];
                if (meal.slot === 'dinner') return dietSync.dinnerDone;
                return !!checks[it.id];
              }).length;
              const total = meal.items.length;
              const pct = Math.round((done / total) * 100);
              return (
                <div className={`timeline-card${cardClass}`} key={meal.slot}>
                  <div className="timeline-time">{meal.icon} {meal.label} {meal.time}</div>
                  <ul className="checklist">
                    {meal.items.map((item) => {
                      const itemChecked = isItemChecked(meal.slot, item.id);
                      const isMealSync = (meal.slot === 'lunch') || (meal.slot === 'dinner' && item.id !== 'd-4');
                      return (
                        <li key={item.id}>
                          <div
                            className={`check-item${itemChecked ? ' checked' : ''}`}
                            onClick={() => {
                              if (isMealSync) return; // synced from diet tab, not manually togglable
                              toggle(item.id);
                            }}
                            style={isMealSync ? {cursor:'default'} : {}}
                          >
                            <span className="check-box">{checkIcon}</span>
                            <span>
                              <span className="check-text">{item.text}</span>
                              {item.sub && <div className="check-sub">{item.sub}</div>}
                              {isMealSync && !itemChecked && <div className="check-sub">{'\uC2DD\uB2E8 \uD0ED\uC5D0\uC11C \uCCB4\uD06C'}</div>}
                            </span>
                          </div>
                          {item.accordion && <WorkoutAccordion accordionKey={item.accordion} />}
                        </li>
                      );
                    })}
                  </ul>
                  {/* Show extras added from diet tab */}
                  {(meal.slot === 'lunch' || meal.slot === 'dinner' || meal.slot === 'snack') &&
                    (dietSync.extras[meal.slot === 'dinner' ? 'dinner' : meal.slot] || []).length > 0 && (
                    <div style={{marginTop:8,paddingTop:8,borderTop:'1px solid var(--border)'}}>
                      {(dietSync.extras[meal.slot === 'dinner' ? 'dinner' : meal.slot]).map((f, i) => (
                        <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'4px 10px',fontSize:12,color:'var(--primary)'}}>
                          <span>{'\u2713'} {f.name}{(f.qty || 1) > 1 ? ` \u00D7${f.qty}` : ''}</span>
                          <span style={{color:'var(--sub)'}}>{Math.round(f.kcal * (f.qty || 1))}kcal</span>
                        </div>
                      ))}
                    </div>
                  )}
                  <div className="card-progress">
                    <div className="progress-bar">
                      <div
                        className={`progress-fill ${isA ? 'green' : 'blue'}`}
                        style={{ width: `${pct}%` }}
                      />
                    </div>
                    <span className="progress-text">{done}/{total} {'\uC644\uB8CC'}</span>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    /* ─── Running helpers ─── */
    function getWeight() {
      return loadSettings().weight || 71;
    }
    function haversine(lat1, lon1, lat2, lon2) {
      const R = 6371000;
      const toRad = (d) => (d * Math.PI) / 180;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);
      const a = Math.sin(dLat / 2) ** 2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }
    function formatTime(sec) {
      const h = String(Math.floor(sec / 3600)).padStart(2, '0');
      const m = String(Math.floor((sec % 3600) / 60)).padStart(2, '0');
      const s = String(sec % 60).padStart(2, '0');
      return `${h}:${m}:${s}`;
    }
    function formatPace(distKm, sec) {
      if (distKm < 0.01) return "-'--\"";
      const paceS = sec / distKm;
      const pm = Math.floor(paceS / 60);
      const ps = Math.floor(paceS % 60);
      return `${pm}'${String(ps).padStart(2, '0')}"`;
    }
    /* ─── Workout history loader ─── */
    function loadWorkoutHistory() {
      const results = [];
      const now = new Date();
      for (let i = 0; i < 30; i++) {
        const d = new Date(now.getFullYear(), now.getMonth(), now.getDate() - i);
        const key = `diet-workout-${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
        try {
          const data = JSON.parse(localStorage.getItem(key));
          if (data && data.completed) {
            results.push({
              date: d,
              label: `${d.getMonth()+1}/${d.getDate()}`,
              totalTime: data.totalTime || 0,
              kcal: data.kcal || 250,
            });
          }
        } catch {}
      }
      return results;
    }

    /* ─── Collapsible History Section ─── */
    function HistorySection({ title, children, count }) {
      const [open, setOpen] = useState(false);
      return (
        <div style={{width:'100%'}}>
          <div className="hist-toggle" onClick={() => setOpen(!open)}>
            <span className="hist-toggle-title">{title} {count > 0 && `(${count})`}</span>
            <span className={`hist-toggle-arrow${open ? ' open' : ''}`}>{'\u25BC'}</span>
          </div>
          <div className={`hist-list${open ? ' open' : ''}`}>
            {children}
          </div>
        </div>
      );
    }

    function getRunHistoryKey() { return 'diet-run-history'; }
    function loadRunHistory() {
      try { return JSON.parse(localStorage.getItem(getRunHistoryKey())) || []; }
      catch { return []; }
    }
    function saveRunRecord(record) {
      const hist = loadRunHistory();
      hist.unshift(record);
      if (hist.length > 30) hist.length = 30;
      localStorage.setItem(getRunHistoryKey(), JSON.stringify(hist));
    }

    function deleteRunRecord(index) {
      const hist = loadRunHistory();
      hist.splice(index, 1);
      localStorage.setItem(getRunHistoryKey(), JSON.stringify(hist));
      return hist;
    }

    function RunningPage() {
      const [status, setStatus] = useState('idle'); // idle | running | paused | done
      const [distance, setDistance] = useState(0);
      const [elapsed, setElapsed] = useState(0);
      const [gpsOk, setGpsOk] = useState(false);
      const [summary, setSummary] = useState(null);
      const [history, setHistory] = useState(loadRunHistory);

      const lastPos = React.useRef(null);
      const watchId = React.useRef(null);
      const timerId = React.useRef(null);
      const distRef = React.useRef(0);
      const elapsedRef = React.useRef(0);
      const statusRef = React.useRef('idle');

      useEffect(() => {
        statusRef.current = status;
      }, [status]);

      const startTimer = useCallback(() => {
        if (timerId.current) return;
        timerId.current = setInterval(() => {
          if (statusRef.current === 'running') {
            elapsedRef.current += 1;
            setElapsed(elapsedRef.current);
          }
        }, 1000);
      }, []);

      const stopTimer = useCallback(() => {
        if (timerId.current) { clearInterval(timerId.current); timerId.current = null; }
      }, []);

      const startGps = useCallback(() => {
        if (watchId.current != null) return;
        if (!navigator.geolocation) return;
        watchId.current = navigator.geolocation.watchPosition(
          (pos) => {
            setGpsOk(true);
            if (statusRef.current !== 'running') return;
            const { latitude, longitude } = pos.coords;
            if (lastPos.current) {
              const d = haversine(lastPos.current.lat, lastPos.current.lon, latitude, longitude);
              if (d >= 5) {
                distRef.current += d;
                setDistance(distRef.current);
                lastPos.current = { lat: latitude, lon: longitude };
              }
            } else {
              lastPos.current = { lat: latitude, lon: longitude };
            }
          },
          () => setGpsOk(false),
          { enableHighAccuracy: true, maximumAge: 3000, timeout: 10000 }
        );
      }, []);

      const stopGps = useCallback(() => {
        if (watchId.current != null) {
          navigator.geolocation.clearWatch(watchId.current);
          watchId.current = null;
        }
      }, []);

      useEffect(() => () => { stopTimer(); stopGps(); }, [stopTimer, stopGps]);

      const handleStart = useCallback(() => {
        distRef.current = 0; elapsedRef.current = 0;
        lastPos.current = null;
        setDistance(0); setElapsed(0); setSummary(null);
        setStatus('running');
        startGps(); startTimer();
      }, [startGps, startTimer]);

      const handlePause = useCallback(() => setStatus('paused'), []);
      const handleResume = useCallback(() => { lastPos.current = null; setStatus('running'); }, []);

      const handleStop = useCallback(() => {
        stopTimer(); stopGps();
        const distKm = distRef.current / 1000;
        const sec = elapsedRef.current;
        const cal = Math.round(getWeight() * distKm * 1.0);
        const record = {
          date: new Date().toISOString(),
          distKm: Math.round(distKm * 100) / 100,
          seconds: sec,
          pace: formatPace(distKm, sec),
          kcal: cal,
        };
        saveRunRecord(record);
        setSummary(record);
        setHistory(loadRunHistory());
        setStatus('done');
      }, [stopTimer, stopGps]);

      const handleDelete = useCallback((index) => {
        const updated = deleteRunRecord(index);
        setHistory(updated);
      }, []);

      const handleNew = useCallback(() => {
        setStatus('idle'); setSummary(null);
        distRef.current = 0; elapsedRef.current = 0;
        lastPos.current = null;
        setDistance(0); setElapsed(0);
      }, []);

      const distKm = distance / 1000;
      const weight = getWeight();
      const calories = Math.round(weight * distKm * 1.0);
      const isActive = status === 'running' || status === 'paused';

      if (summary) {
        return (
          <div className="running-wrap">
            <div className="run-summary">
              <div className="run-summary-title">{'\uD83C\uDFC3'} 러닝 완료!</div>
              <div className="run-summary-row">
                <span className="run-summary-label">총 거리</span>
                <span className="run-summary-value">{summary.distKm} km</span>
              </div>
              <div className="run-summary-row">
                <span className="run-summary-label">총 시간</span>
                <span className="run-summary-value">{formatTime(summary.seconds)}</span>
              </div>
              <div className="run-summary-row">
                <span className="run-summary-label">평균 페이스</span>
                <span className="run-summary-value">{summary.pace}/km</span>
              </div>
              <div className="run-summary-row">
                <span className="run-summary-label">{'\uD83D\uDD25'} 소모 칼로리</span>
                <span className="run-summary-value">{summary.kcal} kcal</span>
              </div>
            </div>
            <button className="run-new-btn" onClick={handleNew}>새 러닝 시작</button>
            {history.length > 0 && (
              <div className="run-history">
                <div className="run-history-title">최근 기록</div>
                {history.slice(0, 5).map((r, i) => {
                  const d = new Date(r.date);
                  const ds = `${d.getMonth()+1}/${d.getDate()}`;
                  return (
                    <div className="run-history-item" key={i}>
                      <div>
                        <div className="run-history-date">{ds}</div>
                        <div className="run-history-detail">{formatTime(r.seconds)} | {r.pace}/km | {r.kcal}kcal</div>
                      </div>
                      <div className="run-history-right">
                        <div className="run-history-dist">{r.distKm} km</div>
                        <button className="run-delete-btn" onClick={() => handleDelete(i)}>{'\u00D7'}</button>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        );
      }

      return (
        <div className={`running-wrap${status === 'running' ? ' active' : ''}`} style={{position:'relative'}}>
          {status === 'running' && (
            <div className="track-bg">
              <div className="track-lane" style={{top:'20%'}} />
              <div className="track-lane" style={{top:'40%'}} />
              <div className="track-lane" style={{top:'60%'}} />
            </div>
          )}
          <div className="run-distance">
            {distKm.toFixed(2)}<span className="run-unit">km</span>
          </div>
          <div className="run-stats">
            <div className="run-stat">
              <div className="run-stat-value">{formatTime(elapsed)}</div>
              <div className="run-stat-label">경과 시간</div>
            </div>
            <div className="run-stat">
              <div className="run-stat-value">{formatPace(distKm, elapsed)}</div>
              <div className="run-stat-label">페이스/km</div>
            </div>
            <div className="run-stat">
              <div className="run-stat-value">{'\uD83D\uDD25'} {calories}</div>
              <div className="run-stat-label">kcal</div>
            </div>
          </div>
          <div className="run-controls">
            {status === 'idle' && (
              <button className="run-btn run-btn-start pulse" onClick={handleStart}>START</button>
            )}
            {status === 'running' && (
              <>
                <button className="run-btn run-btn-pause" onClick={handlePause}>PAUSE</button>
                <button className="run-btn run-btn-stop" onClick={handleStop}>STOP</button>
              </>
            )}
            {status === 'paused' && (
              <>
                <button className="run-btn run-btn-resume" onClick={handleResume}>GO</button>
                <button className="run-btn run-btn-stop" onClick={handleStop}>STOP</button>
              </>
            )}
          </div>
          <div className={`run-gps-status${gpsOk ? ' connected' : ''}`}>
            {status === 'idle'
              ? 'GPS 준비 중...'

    ];
    const PLANK_DESC = '\uD314\uAF48\uCE58\uC640 \uBC1C\uB05D\uC73C\uB85C \uC9C0\uD0F1, \uBAB8 \uC804\uCCB4 \uC77C\uC9C1\uC120. \uC5C9\uB369\uC774\uAC00 \uC62C\uB77C\uAC00\uAC70\uB098 \uCC98\uC9C0\uC9C0 \uC54A\uAC8C. \uBC30\uC5D0 \uD798 \uC8FC\uACE0 \uD638\uD761\uC740 \uC790\uC5F0\uC2A4\uB7FD\uAC8C \uC720\uC9C0.';
    const PLANK_SETS = 3;
    const PLANK_DURATION = 60;
    const PLANK_REST = 30;

    function playBeep(freq = 880, dur = 100) {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = freq;
        gain.gain.value = 0.3;
        osc.start();
        osc.stop(ctx.currentTime + dur / 1000);
      } catch(e) {}
    }
    function playBeepHigh() { playBeep(1200, 80); }
    function playBeepDone() { playBeep(660, 200); setTimeout(() => playBeep(880, 200), 250); }
