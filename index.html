    /* ─── Circular Timer ─── */
    function CircularTimer({ seconds, total, color }) {
      const r = 90;
      const circ = 2 * Math.PI * r;
      const pct = total > 0 ? seconds / total : 0;
      const offset = circ * (1 - pct);
      return (
        <div className="wo-timer-ring">
          <svg viewBox="0 0 200 200">
            <circle className="wo-timer-bg" cx="100" cy="100" r={r} />
            <circle className="wo-timer-fg" cx="100" cy="100" r={r}
              stroke={color} strokeDasharray={circ} strokeDashoffset={offset} />
          </svg>
          <div className="wo-timer-center">
            <div className="wo-timer-seconds">{seconds}</div>
          </div>
        </div>
      );
    }

    /* ─── WorkoutPage ─── */
    function WorkoutPage() {
      const { isA } = getDayInfo();
      const [woHistory] = useState(() => loadWorkoutHistory());
      const [phase, setPhase] = useState('idle');
      // idle | interval | intervalRest | roundRest | rest5min | dumbbell | dumbbellRest | plank | plankRest | done
      const [timer, setTimer] = useState(0);
      const [paused, setPaused] = useState(false);
      const [round, setRound] = useState(0);
      const [exIdx, setExIdx] = useState(0);
      const [dbIdx, setDbIdx] = useState(0);
      const [dbSet, setDbSet] = useState(0);
      const [plankSet, setPlankSet] = useState(0);
      const [totalTime, setTotalTime] = useState(0);
      const timerRef = React.useRef(null);
      const totalRef = React.useRef(0);
      const phaseRef = React.useRef('idle');
      const pausedRef = React.useRef(false);

      useEffect(() => { phaseRef.current = phase; }, [phase]);
      useEffect(() => { pausedRef.current = paused; }, [paused]);

      const stopTick = useCallback(() => {
        if (timerRef.current) { clearInterval(timerRef.current); timerRef.current = null; }
      }, []);

      useEffect(() => () => stopTick(), [stopTick]);

      const startCountdown = useCallback((secs, onDone) => {
        stopTick();
        setTimer(secs);
        let left = secs;
        timerRef.current = setInterval(() => {
          if (pausedRef.current) return;
          left--;
          totalRef.current++;
          setTotalTime(totalRef.current);
          setTimer(left);
          if (left <= 3 && left > 0) playBeep(440, 60);
          if (left <= 0) {
            clearInterval(timerRef.current);
            timerRef.current = null;
            playBeepHigh();
            onDone();
          }
        }, 1000);
      }, [stopTick]);

      const advanceInterval = useCallback((r, e) => {
        if (e < 4) {
          // exercise phase
          setPhase('interval'); setRound(r); setExIdx(e);
          startCountdown(40, () => {
            // rest 20s then next exercise
            setPhase('intervalRest');
            startCountdown(20, () => advanceInterval(r, e + 1));
          });
        } else {
          // last exercise in round (index 4)
          setPhase('interval'); setRound(r); setExIdx(e);
          startCountdown(40, () => {
            if (r < 2) {
              // round rest 60s
              setPhase('roundRest');
              startCountdown(60, () => advanceInterval(r + 1, 0));
            } else {
              // interval done → 5min rest
              playBeepDone();
              setPhase('rest5min');
              startCountdown(300, () => {
                setPhase('dumbbell');
                setDbIdx(0); setDbSet(0);
              });
            }
          });
        }
      }, [startCountdown]);

      const handleStart = useCallback(() => {
        totalRef.current = 0; setTotalTime(0);
        setPaused(false);
        advanceInterval(0, 0);
      }, [advanceInterval]);

      const handlePause = useCallback(() => setPaused(true), []);
      const handleResume = useCallback(() => setPaused(false), []);

      // Dumbbell: set complete
      const handleDbSetDone = useCallback(() => {
        const ex = DUMBBELL_EXERCISES[dbIdx];
        const nextSet = dbSet + 1;
        if (nextSet >= ex.sets) {
          // next exercise
          const nextEx = dbIdx + 1;
          if (nextEx >= DUMBBELL_EXERCISES.length) {
            playBeepDone();
            setPhase('plank'); setPlankSet(0);
            startCountdown(PLANK_DURATION, () => {
              if (0 + 1 < PLANK_SETS) {
                setPhase('plankRest');
                startCountdown(PLANK_REST, () => {
                  setPlankSet(1);
                  setPhase('plank');
                  startCountdown(PLANK_DURATION, () => {
                    setPhase('plankRest');
                    startCountdown(PLANK_REST, () => {
                      setPlankSet(2);
                      setPhase('plank');
                      startCountdown(PLANK_DURATION, () => finishWorkout());
                    });
                  });
                });
              }
            });
          } else {
            setDbIdx(nextEx); setDbSet(0);
            setPhase('dumbbellRest');
            startCountdown(ex.rest, () => setPhase('dumbbell'));
          }
        } else {
          setDbSet(nextSet);
          setPhase('dumbbellRest');
          startCountdown(ex.rest, () => setPhase('dumbbell'));
        }
      }, [dbIdx, dbSet, startCountdown]);

      const startPlankSequence = useCallback((setNum) => {
        setPlankSet(setNum);
        setPhase('plank');
        startCountdown(PLANK_DURATION, () => {
          if (setNum + 1 < PLANK_SETS) {
            setPhase('plankRest');
            startCountdown(PLANK_REST, () => startPlankSequence(setNum + 1));
          } else {
            finishWorkout();
          }
        });
      }, [startCountdown]);

      const handleDbAllDone = useCallback(() => {
        playBeepDone();
        startPlankSequence(0);
      }, [startPlankSequence]);

      // Override handleDbSetDone to use startPlankSequence properly
      const handleSetComplete = useCallback(() => {
        const ex = DUMBBELL_EXERCISES[dbIdx];
        const nextSet = dbSet + 1;
        if (nextSet >= ex.sets) {
          const nextEx = dbIdx + 1;
          if (nextEx >= DUMBBELL_EXERCISES.length) {
            handleDbAllDone();
          } else {
            setPhase('dumbbellRest');
            startCountdown(ex.rest, () => {
              setDbIdx(nextEx); setDbSet(0);
              setPhase('dumbbell');
            });
          }
        } else {
          setPhase('dumbbellRest');
          startCountdown(ex.rest, () => {
            setDbSet(nextSet);
            setPhase('dumbbell');
          });
        }
      }, [dbIdx, dbSet, startCountdown, handleDbAllDone]);

      const finishWorkout = useCallback(() => {
        stopTick();
        playBeepDone();
        setPhase('done');
        // save to localStorage
        const d = new Date();
        const key = `diet-workout-${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
        const record = { completed: true, totalTime: totalRef.current, kcal: 250 };
        localStorage.setItem(key, JSON.stringify(record));
        // auto-check home checklist items
        const checks = loadChecks();
        checks['b-m-4'] = true;
        checks['b-m-5'] = true;
        checks['b-m-6'] = true;
        saveChecks(checks);
      }, [stopTick]);

      // Workout history section (reused in multiple views)
      const woHistorySection = (
        <HistorySection title={'\uD83D\uDCCB \uC6B4\uB3D9 \uAE30\uB85D'} count={woHistory.length}>
          {woHistory.length === 0 ? (
            <div className="hist-empty">{'\uC544\uC9C1 \uAE30\uB85D\uC774 \uC5C6\uC2B5\uB2C8\uB2E4'}</div>
          ) : (
            woHistory.map((r, i) => {
              const mins = Math.floor(r.totalTime / 60);
              const secs = r.totalTime % 60;
              return (
                <div className="hist-card" key={i}>
                  <div className="hist-card-top">
                    <span className="hist-date">{r.label}</span>
                    <span className="hist-badge hist-badge-workout">{'\uC644\uB8CC'}</span>
                  </div>
                  <div className="hist-card-stats">
                    <span className="hist-stat">{'\u23F1'} <b>{mins}{'\uBD84'} {secs}{'\uCD08'}</b></span>
                    <span className="hist-stat">{'\uD83D\uDD25'} <b>{r.kcal}kcal</b></span>
                  </div>
                </div>
              );
            })
          )}
        </HistorySection>
      );

      // A-day view
      if (isA) {
        return (
          <div className="wo-aday">
            <div className="wo-aday-emoji">{'\uD83C\uDFC3'}</div>
            <div className="wo-aday-text">{'\uC624\uB298\uC740 \uC870\uAE45\uC77C\uC785\uB2C8\uB2E4'}</div>
            <button className="wo-aday-btn" onClick={() => {
              document.querySelectorAll('.nav-item')[1]?.click();
            }}>{'\uB7EC\uB2DD \uD0ED\uC73C\uB85C \uC774\uB3D9'}</button>
            <div style={{width:'100%',marginTop:16}}>{woHistorySection}</div>
          </div>
        );
      }

      // Done view
      if (phase === 'done') {
        const mins = Math.floor(totalTime / 60);
        const secs = totalTime % 60;
        return (
          <div className="wo-wrap">
            <div className="wo-done-card">
              <div className="wo-done-emoji">{'\uD83C\uDF89'}</div>
              <div className="wo-done-title">{'\uC624\uB298 \uC6B4\uB3D9 \uC644\uB8CC! \uC218\uACE0\uD588\uC5B4!'}</div>
              <div className="wo-done-row">
                <span className="wo-done-label">{'\uCD1D \uC18C\uC694\uC2DC\uAC04'}</span>
                <span className="wo-done-value">{mins}{'\uBD84'} {secs}{'\uCD08'}</span>
              </div>
              <div className="wo-done-row">
                <span className="wo-done-label">{'\uB9E8\uBAAC \uC778\uD130\uBC8C'}</span>
                <span className="wo-done-value">170 kcal</span>
              </div>
              <div className="wo-done-row">
                <span className="wo-done-label">{'\uC544\uB839 \uC6B4\uB3D9'}</span>
                <span className="wo-done-value">60 kcal</span>
              </div>
              <div className="wo-done-row">
                <span className="wo-done-label">{'\uD50C\uB7AD\uD06C'}</span>
                <span className="wo-done-value">20 kcal</span>
              </div>
              <div className="wo-done-row">
                <span className="wo-done-label">{'\uD83D\uDD25 \uCD1D \uC18C\uBAA8 \uCE7C\uB85C\uB9AC'}</span>
                <span className="wo-done-value" style={{color:'var(--primary)'}}>250 kcal</span>
              </div>
            </div>
            {woHistorySection}
          </div>
        );
      }

      // Idle view
      if (phase === 'idle') {
        return (
          <div className="wo-wrap">
            <div className="page-title" style={{marginBottom:8}}>{'\uD83D\uDCAA'} {'\uB9E8\uBAAC \uC778\uD130\uBC8C'}</div>
            <div className="page-subtitle" style={{marginBottom:32}}>{'\uC624\uB298\uC758 B\uC77C \uC6B4\uB3D9\uC744 \uC2DC\uC791\uD558\uC138\uC694'}</div>
            <button className="wo-btn wo-btn-start pulse" onClick={handleStart}>START</button>
            <div style={{width:'100%',marginTop:16}}>{woHistorySection}</div>
          </div>
        );
      }

      // Dumbbell phase
      if (phase === 'dumbbell' || phase === 'dumbbellRest') {
        const ex = DUMBBELL_EXERCISES[dbIdx];
        return (
          <div className="wo-wrap wo-rest">
            <div className="wo-phase-label">{'\uC544\uB839 \uC6B4\uB3D9'} {dbIdx + 1}/{DUMBBELL_EXERCISES.length}</div>
            <div className="wo-set-card">
              <div className="wo-set-title">{ex.name}</div>
              <div className="wo-set-subtitle">{ex.target} | {ex.sets}{'\uC138\uD2B8'} x {ex.reps}{'\uD68C'}</div>
              {ex.desc && <div className="wo-exercise-desc" style={{textAlign:'left',margin:'0 0 12px',maxWidth:'100%'}}>{ex.desc}</div>}
              <div className="wo-set-progress">
                {Array.from({length: ex.sets}, (_, i) => (
                  <div key={i} className={`wo-set-dot${i < dbSet ? ' done' : i === dbSet ? ' current' : ''}`}>
                    {i < dbSet ? '\u2713' : i + 1}
                  </div>
                ))}
              </div>
              {phase === 'dumbbellRest' ? (
                <div className="wo-set-rest">{'\uD734\uC2DD'} {timer}{'\uCD08'}</div>
              ) : (
                <button className="wo-set-btn" onClick={handleSetComplete}>
                  {dbSet + 1}{'\uC138\uD2B8 \uC644\uB8CC'} ({ex.reps}{'\uD68C'})
                </button>
              )}
            </div>
          </div>
        );
      }

      // Plank phase
      if (phase === 'plank' || phase === 'plankRest') {
        return (
          <div className={`wo-wrap ${phase === 'plank' ? 'wo-exercise' : 'wo-rest'}`}>
            <div className="wo-phase-label">{'\uD50C\uB7AD\uD06C \uB9C8\uBB34\uB9AC'}</div>
            <div className="wo-round">{'\uC138\uD2B8'} {plankSet + 1}/{PLANK_SETS}</div>
            <CircularTimer
              seconds={timer}
              total={phase === 'plank' ? PLANK_DURATION : PLANK_REST}
              color={phase === 'plank' ? 'var(--danger)' : 'var(--blue)'}
            />
            <div className="wo-timer-status" style={{fontSize:16,fontWeight:700,color: phase==='plank'?'var(--danger)':'var(--blue)'}}>
              {phase === 'plank' ? '\uD50C\uB7AD\uD06C \uC720\uC9C0' : '\uD734\uC2DD \uC911'}
            </div>
            {phase === 'plank' && <div className="wo-exercise-desc" style={{marginTop:12}}>{PLANK_DESC}</div>}
          </div>
        );
      }

      // 5min rest
      if (phase === 'rest5min') {
        const m = Math.floor(timer / 60);
        const s = timer % 60;
        return (
          <div className="wo-wrap wo-rest">
            <div className="wo-phase-label">{'\uC778\uD130\uBC8C \uC644\uB8CC!'}</div>
            <CircularTimer seconds={timer} total={300} color="var(--blue)" />
            <div className="wo-exercise-name" style={{color:'var(--blue)'}}>{m}:{String(s).padStart(2,'0')}</div>
            <div className="wo-exercise-desc">{'\uD734\uC2DD \uD6C4 \uC544\uB839 \uC6B4\uB3D9\uC774 \uC2DC\uC791\uB429\uB2C8\uB2E4'}</div>
          </div>
        );
      }

      // Interval / intervalRest / roundRest phases
      const ex = INTERVAL_EXERCISES[exIdx] || INTERVAL_EXERCISES[0];
      const isExercise = phase === 'interval';
      const isRoundRest = phase === 'roundRest';
      const timerTotal = isExercise ? 40 : isRoundRest ? 60 : 20;
      const timerColor = isExercise ? 'var(--danger)' : 'var(--blue)';
      const bgClass = isExercise ? 'wo-exercise' : 'wo-rest';
      const nextEx = isExercise && exIdx < 4 ? INTERVAL_EXERCISES[exIdx + 1] : null;

      return (
        <div className={`wo-wrap ${bgClass}`}>
          <div className="wo-phase-label">{'\uB9E8\uBAAC \uC778\uD130\uBC8C'}</div>
          <div className="wo-round">{'\uB77C\uC6B4\uB4DC'} {round + 1}/3</div>

          <div className="round-lanes" style={{width:'100%'}}>
            {[0,1,2].map(i => (
              <div key={i} className={`round-lane${i < round ? ' done' : i === round ? ' active' : ''}`} />
            ))}
          </div>

          {isExercise && <Stickman type={ex.anim} paused={paused} />}

          <CircularTimer seconds={timer} total={timerTotal} color={timerColor} />

          <div className="wo-exercise-name">
            {isRoundRest ? '\uB77C\uC6B4\uB4DC \uD734\uC2DD' : ex.name}
          </div>
          {!isRoundRest && <div className="wo-exercise-target">{ex.target}</div>}
          <div className={`wo-timer-status ${isExercise ? 'exercise' : 'rest'}`}>
            {isExercise ? '\uC6B4\uB3D9 \uC911' : '\uD734\uC2DD \uC911'}
          </div>
          {isExercise && <div className="wo-exercise-desc">{ex.desc}</div>}
          {nextEx && <div className="wo-next-preview">{'\uB2E4\uC74C: '}{nextEx.name} ({nextEx.target})</div>}

          <div className="wo-controls">
            {paused ? (
              <button className="wo-btn wo-btn-resume" onClick={handleResume}>GO</button>
            ) : (
              <button className="wo-btn wo-btn-pause" onClick={handlePause}>PAUSE</button>
            )}
          </div>
        </div>
      );
    }

    /* ─── Diet data & helpers ─── */
    const FOOD_PRESETS = [
      { name: '\uACE0\uAD6C\uB9C8 1\uAC1C', kcal: 130, protein: 2 },
      { name: '\uC0B6\uC740 \uB2EC\uAC78 1\uAC1C', kcal: 80, protein: 7 },
      { name: '\uADF8\uB9AD\uC694\uAC70\uD2B8 1\uCEF5', kcal: 130, protein: 15 },
      { name: '\uBE14\uB8E8\uBCA0\uB9AC \uD55C\uC904', kcal: 40, protein: 0.5 },
      { name: '\uACAC\uACFC\uB958 10\uC54C', kcal: 90, protein: 3 },
      { name: '\uB450\uBD80 \uBC18\uBAA8 150g', kcal: 120, protein: 12 },
      { name: '\uBAA9\uC0B4 200g', kcal: 460, protein: 36 },
      { name: '\uB2ED\uAC00\uC2B4\uC0B4 200g', kcal: 220, protein: 46 },
      { name: '\uC0BC\uAC81\uC0B4 200g', kcal: 560, protein: 28 },
      { name: '\uBC14\uB098\uB098 1\uAC1C', kcal: 93, protein: 1 },
      { name: '\uC591\uBC30\uCD94 100g', kcal: 25, protein: 1.5 },
      { name: '\uBC25 1\uACF5\uAE30', kcal: 300, protein: 5 },
      { name: '\uBE0C\uB85C\uCF5C\uB9AC 100g', kcal: 35, protein: 3 },
    ];

    const DEFAULT_MEALS = {
      lunch: [
        { id: 'dl-1', name: '\uACE0\uAD6C\uB9C8 1\uAC1C', kcal: 130, protein: 2 },
        { id: 'dl-2', name: '\uC0B6\uC740 \uB2EC\uAC78 3\uAC1C', kcal: 240, protein: 21 },
        { id: 'dl-3', name: '\uADF8\uB9AD\uC694\uAC70\uD2B8 1\uCEF5', kcal: 130, protein: 15 },
        { id: 'dl-4', name: '\uBE14\uB8E8\uBCA0\uB9AC \uD55C\uC904', kcal: 40, protein: 0.5 },
        { id: 'dl-5', name: '\uACAC\uACFC\uB958 10\uC54C', kcal: 90, protein: 3 },
        { id: 'dl-6', name: '\uB450\uBD80 \uBC18\uBAA8', kcal: 120, protein: 12 },
      ],
      dinner_mok: [
        { id: 'dd-1', name: '\uBAA9\uC0B4 200g', kcal: 460, protein: 36 },
        { id: 'dd-2', name: '\uC591\uBC30\uCD94 100g', kcal: 25, protein: 1.5 },
        { id: 'dd-3', name: '\uACE0\uAD6C\uB9C8 1\uAC1C', kcal: 130, protein: 2 },
      ],
      dinner_dak: [
        { id: 'dd-1', name: '\uB2ED\uAC00\uC2B4\uC0B4 200g', kcal: 220, protein: 46 },
        { id: 'dd-2', name: '\uC591\uBC30\uCD94 100g', kcal: 25, protein: 1.5 },
        { id: 'dd-3', name: '\uACE0\uAD6C\uB9C8 1\uAC1C', kcal: 130, protein: 2 },
      ],
      snack: [
        { id: 'ds-1', name: '\uBC14\uB098\uB098 1\uAC1C (\uC6B4\uB3D9 \uC804)', kcal: 93, protein: 1 },
      ],
    };
    const MEAL_SECTIONS = [
      { key: 'lunch', label: '\uC810\uC2EC', icon: '\u2600\uFE0F' },
      { key: 'dinner', label: '\uC800\uB141', icon: '\uD83C\uDF19' },
      { key: 'snack', label: '\uAC04\uC2DD', icon: '\uD83C\uDF6A' },
    ];
    const SETTINGS_DEFAULTS = {
      height: 173, weight: 71, age: 22,
      goalWeight: 67, goalDate: '2026-06-01',
      goalKcal: 2200, goalProtein: 130,
      startDate: '2026-03-30',
      manualDayOverride: false,
      alarms: {
        workout: { time: '09:30', on: true },
        lunch: { time: '12:00', on: true },
        dinner: { time: '18:00', on: true },
        walk: { time: '19:30', on: true },
      },
    };
    function loadSettings() {
      try {
        const s = JSON.parse(localStorage.getItem('diet-settings'));
        return { ...SETTINGS_DEFAULTS, ...s, alarms: { ...SETTINGS_DEFAULTS.alarms, ...(s?.alarms || {}) } };
      } catch { return { ...SETTINGS_DEFAULTS }; }
    }
    function saveSettings(s) { localStorage.setItem('diet-settings', JSON.stringify(s)); }
    function getDietGoals() {
      const s = loadSettings();
      return { kcal: s.goalKcal || 2200, protein: s.goalProtein || 130 };
    }
    const DIET_GOALS_REF = { current: getDietGoals() };
    function DIET_GOALS_get() { return DIET_GOALS_REF.current; }
    // Keep backward compat
    const DIET_GOALS = { get kcal() { return getDietGoals().kcal; }, get protein() { return getDietGoals().protein; } };

    function getDietKey() {
      const d = new Date();
      return `diet-v2-${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
    }
    function loadDiet() {
      try { return JSON.parse(localStorage.getItem(getDietKey())) || {}; }
      catch { return {}; }
    }
    function saveDiet(data) {
      localStorage.setItem(getDietKey(), JSON.stringify(data));
    }
    function progColor(current, goal) {
      const r = current / goal;
      if (r > 1) return 'var(--danger)';
      if (r > 0.85) return 'var(--energy)';
      return 'var(--primary)';
    }

    function DietPage() {
      const [dietData, setDietData] = useState(loadDiet);
      const [meatType, setMeatType] = useState(() => dietData.meatType || 'mok'); // mok | dak
      const [modal, setModal] = useState(null);
      const [selected, setSelected] = useState(null);
      const [search, setSearch] = useState('');
      const [custom, setCustom] = useState({ name: '', kcal: '', protein: '' });

      const checked = dietData.checked || {};
      const extras = dietData.extras || { lunch: [], dinner: [], snack: [] };

      const dinnerKey = meatType === 'dak' ? 'dinner_dak' : 'dinner_mok';

      // All items per section (defaults + extras)
      const getItems = (sectionKey) => {
        const defaultKey = sectionKey === 'dinner' ? dinnerKey : sectionKey;
        const defaults = (DEFAULT_MEALS[defaultKey] || []).map(f => ({ ...f, isDefault: true }));
        const extra = (extras[sectionKey] || []).map(f => ({ ...f, isDefault: false }));
        return [...defaults, ...extra];
      };

      // Totals: only checked items
      const calcCheckedTotals = () => {
        let kcal = 0, protein = 0;
        MEAL_SECTIONS.forEach(sec => {
          getItems(sec.key).forEach(f => {
            const fid = f.id || f.name;
            if (checked[sec.key + '-' + fid]) {
              const q = f.qty || 1;
              kcal += f.kcal * q;
              protein += f.protein * q;
            }
          });
        });
        return { kcal: Math.round(kcal), protein: Math.round(protein * 10) / 10 };
      };
      const totals = calcCheckedTotals();

      const save = useCallback((newData) => {
        setDietData(newData);
        saveDiet(newData);
      }, []);

      const toggleCheck = useCallback((sectionKey, foodId) => {
        setDietData(prev => {
          const ck = { ...(prev.checked || {}) };
          const key = sectionKey + '-' + foodId;
          ck[key] = !ck[key];
          const next = { ...prev, checked: ck };
          saveDiet(next);
          return next;
        });
      }, []);

      const switchMeat = useCallback((type) => {
        setMeatType(type);
        setDietData(prev => {
          const next = { ...prev, meatType: type };
          saveDiet(next);
          return next;
        });
      }, []);

      // Modal handlers
      const openModal = useCallback((slot) => {
        setModal({ slot });
        setSelected(null);
        setSearch('');
        setCustom({ name: '', kcal: '', protein: '' });
      }, []);
      const closeModal = useCallback(() => { setModal(null); setSelected(null); }, []);

      const confirmAdd = useCallback(() => {
        if (!modal || !selected) return;
        const entry = { ...selected.food, qty: selected.qty, id: 'x-' + Date.now() };
        setDietData(prev => {
          const ex = { ...(prev.extras || { lunch: [], dinner: [], snack: [] }) };
          ex[modal.slot] = [...(ex[modal.slot] || []), entry];
          const next = { ...prev, extras: ex };
          saveDiet(next);
          return next;
        });
        closeModal();
      }, [modal, selected, closeModal]);

      const addCustom = useCallback(() => {
        if (!modal || !custom.name || !custom.kcal) return;
        const entry = {
          name: custom.name, kcal: parseFloat(custom.kcal) || 0,
          protein: parseFloat(custom.protein) || 0, qty: 1, id: 'x-' + Date.now(),
        };
        setDietData(prev => {
          const ex = { ...(prev.extras || { lunch: [], dinner: [], snack: [] }) };
          ex[modal.slot] = [...(ex[modal.slot] || []), entry];
          const next = { ...prev, extras: ex };
          saveDiet(next);
          return next;
        });
        closeModal();
      }, [modal, custom, closeModal]);

      const removeExtra = useCallback((slot, id) => {
        setDietData(prev => {
          const ex = { ...(prev.extras || { lunch: [], dinner: [], snack: [] }) };
          ex[slot] = (ex[slot] || []).filter(f => f.id !== id);
          const next = { ...prev, extras: ex };
          saveDiet(next);
          return next;
        });
      }, []);

      const filtered = FOOD_PRESETS.filter(f =>
        !search || f.name.toLowerCase().includes(search.toLowerCase())
      );

      const checkIcon = (
        <svg viewBox="0 0 24 24" style={{width:12,height:12,fill:'var(--text-inv)'}}><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
      );

      return (
        <div>
          {/* Summary */}
          <div className="diet-summary">
            <div className="diet-summary-row">
              <span className="diet-summary-label">{'\uD83D\uDD25'} {'\uCE7C\uB85C\uB9AC'}</span>
              <span className="diet-summary-nums">{totals.kcal.toLocaleString()} / {DIET_GOALS.kcal.toLocaleString()} kcal</span>
            </div>
            <div className="track-progress">
              <div className="track-fill" style={{
                width: `${Math.min(100, (totals.kcal / DIET_GOALS.kcal) * 100)}%`,
                background: progColor(totals.kcal, DIET_GOALS.kcal),
              }} />
              <span className="track-runner" style={{left:`${Math.min(95, (totals.kcal / DIET_GOALS.kcal) * 100)}%`}}>{'\uD83C\uDFC3'}</span>
            </div>
            <div className="diet-summary-row" style={{marginTop:14}}>
              <span className="diet-summary-label">{'\uD83E\uDD69'} {'\uB2E8\uBC31\uC9C8'}</span>
              <span className="diet-summary-nums">{totals.protein}g / {DIET_GOALS.protein}g</span>
            </div>
            <div className="track-progress">
              <div className="track-fill" style={{
                width: `${Math.min(100, (totals.protein / DIET_GOALS.protein) * 100)}%`,
                background: progColor(totals.protein, DIET_GOALS.protein),
              }} />
              <span className="track-runner" style={{left:`${Math.min(95, (totals.protein / DIET_GOALS.protein) * 100)}%`}}>{'\uD83C\uDFC3'}</span>
            </div>
          </div>

          {/* Meal sections */}
          {MEAL_SECTIONS.map(sec => {
            const items = getItems(sec.key);
            const secChecked = items.filter(f => checked[sec.key + '-' + (f.id || f.name)]);
            const slotKcal = secChecked.reduce((s, f) => s + f.kcal * (f.qty || 1), 0);
            const slotProt = secChecked.reduce((s, f) => s + f.protein * (f.qty || 1), 0);

            return (
              <div className="meal-section" key={sec.key}>
                <div className="meal-header">
                  <div>
                    <span className="meal-title">{sec.icon} {sec.label}</span>
                    <span className="meal-subtotal"> {Math.round(slotKcal)}kcal / {Math.round(slotProt*10)/10}g</span>
                  </div>
                  <button className="meal-add-btn" onClick={() => openModal(sec.key)}>+</button>
                </div>

                {/* Dinner meat switcher */}
                {sec.key === 'dinner' && (
                  <div style={{display:'flex',gap:8,marginBottom:12}}>
                    <button onClick={() => switchMeat('mok')} style={{
                      flex:1, padding:'8px 0', border:'1px solid', borderRadius:8, cursor:'pointer',
                      borderColor: meatType==='mok' ? 'var(--primary)' : 'var(--check-unchecked)',
                      background: meatType==='mok' ? 'var(--primary-bg)' : 'transparent',
                      color: meatType==='mok' ? 'var(--primary)' : 'var(--sub2)', fontSize:13, fontWeight:600,
                    }}>{'\uBAA9\uC0B4'}</button>
                    <button onClick={() => switchMeat('dak')} style={{
                      flex:1, padding:'8px 0', border:'1px solid', borderRadius:8, cursor:'pointer',
                      borderColor: meatType==='dak' ? 'var(--primary)' : 'var(--check-unchecked)',
                      background: meatType==='dak' ? 'var(--primary-bg)' : 'transparent',
                      color: meatType==='dak' ? 'var(--primary)' : 'var(--sub2)', fontSize:13, fontWeight:600,
                    }}>{'\uB2ED\uAC00\uC2B4\uC0B4'}</button>
                  </div>
                )}

                {items.map(f => {
                  const fid = f.id || f.name;
                  const ck = !!checked[sec.key + '-' + fid];
                  const q = f.qty || 1;
                  return (
                    <div key={fid} style={{display:'flex',alignItems:'center',padding:'10px 0',borderBottom:'1px solid var(--border)'}}>
                      <div
                        onClick={() => toggleCheck(sec.key, fid)}
                        style={{
                          width:22, height:22, minWidth:22, borderRadius:5, marginRight:12, cursor:'pointer',
                          border: ck ? 'none' : '2px solid var(--check-unchecked)',
                          background: ck ? 'var(--success)' : 'transparent',
                          display:'flex', alignItems:'center', justifyContent:'center',
                        }}
                      >{ck && checkIcon}</div>
                      <div style={{flex:1}}>
                        <div style={{fontSize:14, color: ck ? 'var(--text)' : 'var(--sub2)'}}>
                          {f.name}{q > 1 && <span style={{color:'var(--primary)',fontWeight:600,marginLeft:6}}>{'\u00D7'}{q}</span>}
                        </div>
                      </div>
                      <div style={{textAlign:'right',marginLeft:8}}>
                        <div style={{fontSize:12, color: ck ? 'var(--sub)' : 'var(--sub2)'}}>{Math.round(f.kcal * q)}kcal</div>
                        <div style={{fontSize:11, color: ck ? 'var(--sub2)' : 'var(--sub2)'}}>{Math.round(f.protein * q * 10)/10}g</div>
                      </div>
                      {!f.isDefault && (
                        <button className="food-del-btn" onClick={() => removeExtra(sec.key, f.id)} style={{marginLeft:4}}>{'\u00D7'}</button>
                      )}
                    </div>
                  );
                })}
              </div>
            );
          })}

          {/* Modal */}
          {modal && (
            <div className="modal-overlay" onClick={(e) => { if (e.target === e.currentTarget) closeModal(); }}>
              <div className="modal-content">
                <div className="modal-header">
                  <div className="modal-title">{'\uC74C\uC2DD \uCD94\uAC00'}</div>
                  <button className="modal-close" onClick={closeModal}>{'\u00D7'}</button>
                </div>
                {selected ? (
                  <div>
                    <div style={{textAlign:'center',marginBottom:8}}>
                      <div style={{fontSize:18,fontWeight:700,color:'var(--text)'}}>{selected.food.name}</div>
                      <div style={{fontSize:13,color:'var(--sub)',marginTop:4}}>
                        {selected.food.kcal}kcal | {selected.food.protein}g {'\uB2E8\uBC31\uC9C8'} ({'\uAC1C\uB2F9'})
                      </div>
                    </div>
                    <div className="qty-row">
                      <button className="qty-btn" onClick={() => setSelected(p => ({...p, qty: Math.max(1, p.qty - 1)}))}>-</button>
                      <span className="qty-num">{selected.qty}</span>
                      <button className="qty-btn" onClick={() => setSelected(p => ({...p, qty: p.qty + 1}))}>+</button>
                    </div>
                    <div style={{textAlign:'center',fontSize:14,color:'var(--sub)',marginBottom:16}}>
                      {'\uCD1D'} {Math.round(selected.food.kcal * selected.qty)}kcal / {Math.round(selected.food.protein * selected.qty * 10)/10}g
                    </div>
                    <button className="qty-confirm" onClick={confirmAdd}>{'\uCD94\uAC00\uD558\uAE30'}</button>
                  </div>
                ) : (
                  <div>
                    <input className="modal-search" placeholder={'\uC74C\uC2DD \uAC80\uC0C9...'} value={search}
                      onChange={e => setSearch(e.target.value)} autoFocus />
                    <div className="food-grid">
                      {filtered.map((f, i) => (
                        <div className="food-preset" key={i} onClick={() => setSelected({ food: f, qty: 1 })}>
                          <div className="food-preset-name">{f.name}</div>
                          <div className="food-preset-info">{f.kcal}kcal | {f.protein}g</div>
                        </div>
                      ))}
                    </div>
                    <div className="custom-form">
                      <div className="custom-form-title">{'\uC9C1\uC811 \uC785\uB825'}</div>
                      <div className="custom-form-row">
                        <input className="custom-input" placeholder={'\uC74C\uC2DD \uC774\uB984'}
                          value={custom.name} onChange={e => setCustom(p => ({...p, name: e.target.value}))} />
                      </div>
                      <div className="custom-form-row">
                        <input className="custom-input" placeholder="kcal" type="number" inputMode="numeric"
                          value={custom.kcal} onChange={e => setCustom(p => ({...p, kcal: e.target.value}))} />
                        <input className="custom-input" placeholder={'\uB2E8\uBC31\uC9C8(g)'} type="number" inputMode="decimal"
                          value={custom.protein} onChange={e => setCustom(p => ({...p, protein: e.target.value}))} />
                      </div>
                      <button className="custom-submit" disabled={!custom.name || !custom.kcal} onClick={addCustom}>
                        {'\uC9C1\uC811 \uCD94\uAC00'}
                      </button>
                    </div>
                  </div>
                )}
              </div>
            </div>
          )}
        </div>
      );
    }

    function SettingsPage() {
      const [settings, setSettings] = useState(loadSettings);
      const [saved, setSaved] = useState(false);
      const [theme, setTheme] = useState(() => document.documentElement.dataset.theme || 'light');

      const toggleTheme = useCallback(() => {
        const next = theme === 'dark' ? 'light' : 'dark';
        document.documentElement.dataset.theme = next;
        localStorage.setItem('diet-theme', next);
        setTheme(next);
      }, [theme]);

      const update = useCallback((key, val) => {
        setSettings(prev => {
          const next = { ...prev, [key]: val };
          saveSettings(next);
          // sync legacy keys
          if (key === 'weight') localStorage.setItem('diet-weight', String(val));
          if (key === 'startDate') setStartDate(val);
          return next;
        });
        setSaved(true);
        setTimeout(() => setSaved(false), 1500);
      }, []);

      const updateAlarm = useCallback((alarmKey, field, val) => {
        setSettings(prev => {
          const alarms = { ...prev.alarms, [alarmKey]: { ...prev.alarms[alarmKey], [field]: val } };
          const next = { ...prev, alarms };
          saveSettings(next);
          return next;
        });
      }, []);

      const requestNotif = useCallback(() => {
        if ('Notification' in window) {
          Notification.requestPermission();
        }
      }, []);

      const handleReset = useCallback(() => {
        if (confirm('\uBAA8\uB4E0 \uB370\uC774\uD130\uB97C \uCD08\uAE30\uD654\uD558\uC2DC\uACA0\uC2B5\uB2C8\uAE4C? \uC774 \uC791\uC5C5\uC740 \uB418\uB3CC\uB9B4 \uC218 \uC5C6\uC2B5\uB2C8\uB2E4.')) {
          localStorage.clear();
          window.location.reload();
        }
      }, []);

      const { isA, dayNumber } = getDayInfo();

      // Goal calculations
      const today = new Date();
      const goalD = new Date(settings.goalDate + 'T00:00:00');
      const daysLeft = Math.max(0, Math.ceil((goalD - today) / (1000*60*60*24)));
      const weightToLose = Math.max(0, settings.weight - settings.goalWeight);
      const weeksLeft = Math.max(1, daysLeft / 7);
      const weeklyRate = (weightToLose / weeksLeft).toFixed(2);

      const alarmList = [
        { key: 'workout', label: '\uC6B4\uB3D9 \uC2DC\uC791' },
        { key: 'lunch', label: '\uC810\uC2EC \uC2DD\uC0AC' },
        { key: 'dinner', label: '\uC800\uB141 \uC2DD\uC0AC' },
        { key: 'walk', label: '\uC800\uB141 \uC0B0\uCC45' },
      ];

      return (
        <div>
          <div className="page-title">{'\u2699\uFE0F'} {'\uC124\uC815'}</div>
          {saved && <span className="settings-saved">{'\u2713'} {'\uC800\uC7A5\uB428'}</span>}

          {/* Dark mode */}
          <div className="settings-card" style={{marginTop:20}}>
            <div className="settings-row">
              <span className="settings-row-label">{theme === 'dark' ? '\uD83C\uDF19' : '\u2600\uFE0F'} {'\uB2E4\uD06C \uBAA8\uB4DC'}</span>
              <button className={`toggle${theme === 'dark' ? ' on' : ''}`} onClick={toggleTheme}>
                <div className="toggle-knob" />
              </button>
            </div>
          </div>

          {/* Profile */}
          <div className="settings-card">
            <div className="settings-card-title">{'\uD83D\uDC64'} {'\uD504\uB85C\uD544'}</div>
            <div className="settings-row">
              <span className="settings-row-label">{'\uD0A4'} (cm)</span>
              <input className="settings-row-input" type="number" inputMode="numeric"
                value={settings.height} onChange={e => update('height', parseFloat(e.target.value) || 0)} />
            </div>
            <div className="settings-row">
              <span className="settings-row-label">{'\uD604\uC7AC \uCCB4\uC911'} (kg)</span>
              <input className="settings-row-input" type="number" inputMode="decimal" step="0.1"
                value={settings.weight} onChange={e => update('weight', parseFloat(e.target.value) || 0)} />
            </div>
            <div className="settings-row">
              <span className="settings-row-label">{'\uB098\uC774'}</span>
              <input className="settings-row-input" type="number" inputMode="numeric"
                value={settings.age} onChange={e => update('age', parseInt(e.target.value) || 0)} />
            </div>
          </div>

          {/* Goals */}
          <div className="settings-card">
            <div className="settings-card-title">{'\uD83C\uDFAF'} {'\uBAA9\uD45C'}</div>
            <div className="settings-row">
              <span className="settings-row-label">{'\uBAA9\uD45C \uCCB4\uC911'} (kg)</span>
              <input className="settings-row-input" type="number" inputMode="decimal" step="0.1"
                value={settings.goalWeight} onChange={e => update('goalWeight', parseFloat(e.target.value) || 0)} />
            </div>
            <div className="settings-row">
              <span className="settings-row-label">{'\uBAA9\uD45C \uB0A0\uC9DC'}</span>
              <input className="settings-row-input" type="date" style={{width:145}}
                value={settings.goalDate} onChange={e => update('goalDate', e.target.value)} />
            </div>
            <div className="settings-row">
              <span className="settings-row-label">{'\uB0A8\uC740 \uC77C\uC218'}</span>
              <span className="settings-row-value">D-{daysLeft}</span>
            </div>
            <div className="settings-row">
              <span className="settings-row-label">{'\uC8FC\uB2F9 \uC608\uC0C1 \uAC10\uB7C9'}</span>
              <span className="settings-row-value">{'\uC8FC'} {weeklyRate}kg</span>
            </div>
          </div>

          {/* Daily targets */}
          <div className="settings-card">
            <div className="settings-card-title">{'\uD83D\uDCCA'} {'\uC77C\uC77C \uBAA9\uD45C'}</div>
            <div className="settings-row">
              <span className="settings-row-label">{'\uBAA9\uD45C \uCE7C\uB85C\uB9AC'} (kcal)</span>
              <input className="settings-row-input" type="number" inputMode="numeric"
                value={settings.goalKcal} onChange={e => update('goalKcal', parseInt(e.target.value) || 0)} />
            </div>
            <div className="settings-row">
              <span className="settings-row-label">{'\uBAA9\uD45C \uB2E8\uBC31\uC9C8'} (g)</span>
              <input className="settings-row-input" type="number" inputMode="numeric"
                value={settings.goalProtein} onChange={e => update('goalProtein', parseInt(e.target.value) || 0)} />
            </div>
            <div className="settings-hint">{'\uC2DD\uB2E8 \uD0ED \uD504\uB85C\uADF8\uB808\uC2A4 \uBC14\uC5D0 \uBC18\uC601\uB429\uB2C8\uB2E4'}</div>
          </div>

          {/* Routine */}
          <div className="settings-card">
            <div className="settings-card-title">{'\uD83D\uDD04'} {'\uB8E8\uD2F4 \uC124\uC815'}</div>
            <div className="settings-row">
              <span className="settings-row-label">A/B {'\uC2DC\uC791 \uAE30\uC900\uC77C'}</span>
              <input className="settings-row-input" type="date" style={{width:145}}
                value={settings.startDate} onChange={e => update('startDate', e.target.value)} />
            </div>
            <div className="settings-row">
              <span className="settings-row-label">Day {dayNumber} — {isA ? 'A (\uC870\uAE45)' : 'B (\uB9E8\uBAAC)'}</span>
              <div className="toggle-wrap">
                <span style={{fontSize:12,color:'var(--sub)'}}>{'\uC218\uB3D9 \uC804\uD658'}</span>
                <button className={`toggle${settings.manualDayOverride ? ' on' : ''}`}
                  onClick={() => update('manualDayOverride', !settings.manualDayOverride)}>
                  <div className="toggle-knob" />
                </button>
              </div>
            </div>
          </div>

          {/* Alarms */}
          <div className="settings-card">
            <div className="settings-card-title">{'\u23F0'} {'\uC54C\uB78C'}</div>
            <div style={{fontSize:11,color:'var(--sub2)',marginBottom:12,cursor:'pointer',textDecoration:'underline'}}
              onClick={requestNotif}>{'\uC54C\uB9BC \uAD8C\uD55C \uD5C8\uC6A9\uD558\uAE30'}</div>
            {alarmList.map(a => {
              const alarm = settings.alarms[a.key] || {};
              return (
                <div className="alarm-row" key={a.key}>
                  <div className="alarm-info">
                    <div className="alarm-name">{a.label}</div>
                  </div>
                  <input className="alarm-time-input" type="time"
                    value={alarm.time || '09:00'}
                    onChange={e => updateAlarm(a.key, 'time', e.target.value)} />
                  <button className={`toggle${alarm.on ? ' on' : ''}`}
                    onClick={() => updateAlarm(a.key, 'on', !alarm.on)}>
                    <div className="toggle-knob" />
                  </button>
                </div>
              );
            })}
          </div>

          {/* Reset */}
          <div className="settings-card" style={{background:'transparent',padding:0}}>
            <button className="settings-reset-btn" onClick={handleReset}>
              {'\uB370\uC774\uD130 \uCD08\uAE30\uD654'}
            </button>
          </div>
        </div>
      );
    }

    /* ─── App ─── */
    const TABS = [
      { id: 'home', label: '홈', icon: Icons.home, component: HomePage },
      { id: 'running', label: '러닝', icon: Icons.running, component: RunningPage },
      { id: 'workout', label: '운동', icon: Icons.fitness, component: WorkoutPage },
      { id: 'diet', label: '식단', icon: Icons.diet, component: DietPage },
      { id: 'settings', label: '설정', icon: Icons.settings, component: SettingsPage },
    ];

    function App() {
      const [activeTab, setActiveTab] = useState('home');

      const today = new Date();
      const dateStr = `${today.getFullYear()}년 ${today.getMonth() + 1}월 ${today.getDate()}일`;
      const weekdays = ['일', '월', '화', '수', '목', '금', '토'];
      const fullDate = `${dateStr} ${weekdays[today.getDay()]}요일`;

      const ActivePage = useMemo(() => {
        return TABS.find((t) => t.id === activeTab)?.component || HomePage;
      }, [activeTab]);

      return (
        <>
          <div className="header">
            <div className="header-title">71키로의 여정</div>
            <div className="header-date">{fullDate}</div>
          </div>

          <div className="content">
            <ActivePage />
          </div>

          <nav className="bottom-nav">
            {TABS.map((tab) => (
              <button
                key={tab.id}
                className={`nav-item${activeTab === tab.id ? ' active' : ''}`}
                onClick={() => setActiveTab(tab.id)}
              >
                <span className="nav-icon">{tab.icon}</span>
                {tab.label}
              </button>
            ))}
          </nav>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
  <script>
    // Service Worker registration + alarm bridge
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/diet/sw.js').then(function(reg) {
        console.log('SW registered');
      }).catch(function(err) {
        console.log('SW failed:', err);
      });
      // Listen for alarm settings request from SW
      navigator.serviceWorker.addEventListener('message', function(e) {
        if (e.data && e.data.type === 'GET_ALARMS') {
          try {
            var s = JSON.parse(localStorage.getItem('diet-settings'));
            if (s && s.alarms && navigator.serviceWorker.controller) {
              navigator.serviceWorker.controller.postMessage({ type: 'ALARM_SETTINGS', alarms: s.alarms });
            }
          } catch(err) {}
        }
      });
    }
  </script>
</body>
</html>
